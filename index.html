<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>RUANG WAKTU · Data Center · QRIS & Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600,1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
--bg:#08080c;--bg-elevated:#111118;--card:rgba(255,255,255,0.03);--card-hover:rgba(255,255,255,0.06);
--border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.12);
--fg:#e8e6e3;--fg-muted:#6e7181;--fg-dim:#3d3f4a;
--accent:#e8a838;--accent-soft:rgba(232,168,56,0.08);
--coral:#f06858;--sage:#7eb88a;--lavender:#a78bfa;
--content-color:#7dd3e8;
--qris-primary:#4fc3f7;--qris-soft:rgba(79,195,247,0.06);
--radius:14px;--radius-lg:18px;--sidebar-w:240px;
--font-display:'Space Grotesk',system-ui,sans-serif;--font-body:'DM Sans',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{min-height:100vh;background:var(--bg);font-family:var(--font-body);color:var(--fg);line-height:1.55;overflow-x:hidden;}
@keyframes spin{to{transform:rotate(360deg);}}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg-elevated);border:1px solid var(--border);border-radius:12px;padding:0.6rem 1.1rem;font-size:0.78rem;color:var(--fg);display:flex;align-items:center;gap:0.45rem;box-shadow:0 12px 40px -10px rgba(0,0,0,0.6);z-index:20000;opacity:0;animation:toastIn 0.35s ease forwards,toastOut 0.35s ease 1.2s forwards;pointer-events:none;white-space:nowrap;}
@keyframes toastIn{to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(10px);}}

.login-overlay{position:fixed;inset:0;z-index:10000;background:linear-gradient(135deg,rgba(8,8,12,0.95),rgba(12,6,22,0.97));display:flex;align-items:center;justify-content:center;transition:opacity 0.8s cubic-bezier(0.4,0,0.2,1),visibility 0.8s ease;opacity:1;visibility:visible;}
.login-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none;}
.login-overlay .scanlines{position:absolute;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,240,255,0.015) 2px,rgba(0,240,255,0.015) 4px);}
.login-overlay .grid-bg{position:absolute;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,240,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,0.03) 1px,transparent 1px);background-size:60px 60px;animation:gridShift 20s linear infinite;}
@keyframes gridShift{0%{background-position:0 0;}100%{background-position:60px 60px;}}
.login-overlay .corner{position:fixed;width:50px;height:50px;pointer-events:none;z-index:2;}
.login-overlay .corner-tl{top:16px;left:16px;border-top:2px solid #00f0ff;border-left:2px solid #00f0ff;box-shadow:0 0 15px rgba(0,240,255,0.3),inset 0 0 15px rgba(0,240,255,0.05);}
.login-overlay .corner-tr{top:16px;right:16px;border-top:2px solid #ff00e5;border-right:2px solid #ff00e5;box-shadow:0 0 15px rgba(255,0,229,0.3),inset 0 0 15px rgba(255,0,229,0.05);}
.login-overlay .corner-bl{bottom:16px;left:16px;border-bottom:2px solid #39ff14;border-left:2px solid #39ff14;box-shadow:0 0 15px rgba(57,255,20,0.3),inset 0 0 15px rgba(57,255,20,0.05);}
.login-overlay .corner-br{bottom:16px;right:16px;border-bottom:2px solid #00f0ff;border-right:2px solid #00f0ff;box-shadow:0 0 15px rgba(0,240,255,0.3),inset 0 0 15px rgba(0,240,255,0.05);}
.login-overlay .side-label{position:fixed;font-family:var(--font-display);font-size:0.55rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(0,240,255,0.2);writing-mode:vertical-rl;pointer-events:none;z-index:2;}
.login-overlay .side-label-left{left:20px;top:50%;transform:translateY(-50%);}
.login-overlay .side-label-right{right:20px;top:50%;transform:translateY(-50%) rotate(180deg);}
.login-card{width:90%;max-width:400px;background:linear-gradient(160deg,rgba(14,14,24,0.97),rgba(6,6,12,0.99));backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:26px;padding:2.5rem 2rem 2rem;position:relative;z-index:5;box-shadow:0 0 0 1px rgba(0,240,255,0.1),0 0 60px -10px rgba(0,240,255,0.12),0 60px 120px -30px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,255,255,0.04);animation:cardFloat 6s ease-in-out infinite;overflow:hidden;}
.login-card .card-inner-glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(0,240,255,0.04) 0%,transparent 70%);}
@keyframes cardFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.login-card::before{content:'';position:absolute;top:0;left:20px;right:20px;height:2px;background:linear-gradient(90deg,transparent,#00f0ff,#ff00e5,#39ff14,transparent);border-radius:2px;box-shadow:0 0 25px rgba(0,240,255,0.5),0 0 50px rgba(255,0,229,0.2);animation:topLineShimmer 3s ease-in-out infinite alternate;}
@keyframes topLineShimmer{0%{opacity:0.7;}100%{opacity:1;}}
.login-card::after{content:'';position:absolute;bottom:0;left:20px;right:20px;height:2px;background:linear-gradient(90deg,transparent,#39ff14,#00f0ff,#ff00e5,transparent);border-radius:2px;box-shadow:0 0 25px rgba(57,255,20,0.4);}
.login-icon{text-align:center;margin-bottom:1.2rem;position:relative;z-index:2;}
.login-icon .icon-ring{display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;border-radius:50%;position:relative;}
.login-icon .icon-ring::before{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid transparent;border-top-color:#00f0ff;border-right-color:#ff00e5;animation:ringRotate 4s linear infinite;}
@keyframes ringRotate{to{transform:rotate(360deg);}}
.login-icon .icon-ring::after{content:'';position:absolute;inset:-8px;border-radius:50%;border:1px solid transparent;border-bottom-color:rgba(57,255,20,0.3);border-left-color:rgba(0,240,255,0.2);animation:ringRotate 6s linear infinite reverse;}
.login-icon i{font-size:1.9rem;color:#00f0ff;position:relative;z-index:1;filter:drop-shadow(0 0 18px rgba(0,240,255,0.6)) drop-shadow(0 0 40px rgba(0,240,255,0.2));background:radial-gradient(circle,rgba(0,240,255,0.08) 0%,transparent 70%);width:72px;height:72px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;}
.login-title{font-family:var(--font-display);font-size:2.1rem;font-weight:700;text-align:center;letter-spacing:0.1em;text-transform:uppercase;color:#fff;margin-bottom:0.2rem;position:relative;z-index:2;text-shadow:0 0 10px rgba(255,0,229,0.7),0 0 25px rgba(255,0,229,0.4),0 0 50px rgba(255,0,229,0.2),0 0 100px rgba(255,0,229,0.1);animation:titleFlicker 4s ease-in-out infinite;}
@keyframes titleFlicker{0%,100%{opacity:1;}48%{opacity:1;}50%{opacity:0.92;}52%{opacity:1;}80%{opacity:1;}82%{opacity:0.95;}84%{opacity:1;}}
.login-sub{text-align:center;font-size:0.65rem;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:#ff00e5;margin-bottom:2rem;position:relative;z-index:2;text-shadow:0 0 12px rgba(255,0,229,0.5);}
.input-group{margin-bottom:1.2rem;position:relative;z-index:2;}
.input-label{display:block;font-family:var(--font-display);font-size:0.64rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:#00f0ff;margin-bottom:0.4rem;text-shadow:0 0 8px rgba(0,240,255,0.35);}
.input-group input{width:100%;padding:0.75rem 0.85rem 0.75rem 2.5rem;background:rgba(0,240,255,0.025);border:1px solid rgba(0,240,255,0.15);border-radius:12px;font-family:var(--font-body);font-size:0.84rem;color:var(--fg);transition:all 0.35s ease;box-shadow:inset 0 2px 10px rgba(0,0,0,0.35);}
.input-group input:focus{outline:none;border-color:rgba(0,240,255,0.6);background:rgba(0,240,255,0.05);box-shadow:0 0 0 4px rgba(0,240,255,0.08),0 0 25px -5px rgba(0,240,255,0.25),inset 0 2px 10px rgba(0,0,0,0.3);}
.input-group .input-icon{position:absolute;left:0.9rem;top:2.15rem;transform:translateY(-50%);color:rgba(0,240,255,0.4);font-size:0.85rem;transition:all 0.35s ease;pointer-events:none;}
.password-toggle{position:absolute;right:0.75rem;top:2.15rem;transform:translateY(-50%);background:none;border:none;color:rgba(110,113,129,0.5);cursor:pointer;font-size:0.82rem;padding:0;display:flex;align-items:center;justify-content:center;transition:all 0.25s ease;width:30px;height:30px;border-radius:8px;}
.password-toggle:hover{color:#00f0ff;background:rgba(0,240,255,0.08);text-shadow:0 0 8px rgba(0,240,255,0.5);}
.login-btn{width:100%;padding:0.9rem;position:relative;z-index:2;background:linear-gradient(135deg,rgba(0,240,255,0.08),rgba(57,255,20,0.03));border:1px solid rgba(0,240,255,0.35);border-radius:14px;font-family:var(--font-display);font-weight:700;font-size:0.92rem;color:#00f0ff;cursor:pointer;transition:all 0.35s ease;margin-top:0.75rem;display:flex;align-items:center;justify-content:center;gap:0.6rem;letter-spacing:0.16em;text-transform:uppercase;text-shadow:0 0 12px rgba(0,240,255,0.5);box-shadow:0 0 25px -5px rgba(0,240,255,0.25),inset 0 1px 0 rgba(255,255,255,0.04);overflow:hidden;}
.login-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,240,255,0.15),transparent);transition:left 0.6s ease;}
.login-btn:hover{transform:translateY(-3px);border-color:rgba(0,240,255,0.7);box-shadow:0 0 40px -5px rgba(0,240,255,0.4),0 12px 35px -10px rgba(0,240,255,0.25),inset 0 1px 0 rgba(255,255,255,0.08);}
.login-btn:hover::before{left:100%;}
.login-btn:active{transform:translateY(1px);}
.login-btn.success-flash{border-color:rgba(57,255,20,0.7);color:#39ff14;text-shadow:0 0 12px rgba(57,255,20,0.6);box-shadow:0 0 40px -5px rgba(57,255,20,0.4),inset 0 0 30px rgba(57,255,20,0.08);}
.login-error{font-size:0.72rem;color:#ff0055;text-align:center;margin-top:1rem;min-height:1.3rem;font-weight:500;text-shadow:0 0 8px rgba(255,0,85,0.4);position:relative;z-index:2;animation:shakeError 0.4s ease;}
@keyframes shakeError{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}50%{transform:translateX(6px);}75%{transform:translateX(-3px);}}
.login-footer-note{margin-top:1.5rem;text-align:center;font-size:0.58rem;color:rgba(0,240,255,0.35);letter-spacing:0.22em;text-transform:uppercase;padding-top:1rem;border-top:1px solid rgba(0,240,255,0.08);position:relative;z-index:2;}

.app-layout{display:flex;min-height:100vh;position:relative;z-index:1;}
.app-layout.entering .sidebar{animation:slideInLeft 0.7s cubic-bezier(0.16,1,0.3,1) both;}
.app-layout.entering .main-content{animation:fadeInUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.15s both;}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-40px);}to{opacity:1;transform:translateX(0);}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

.bg-atmosphere{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-atmosphere .orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:0.4;animation:orbFloat 20s ease-in-out infinite alternate;}
.bg-atmosphere .orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(232,168,56,0.18),transparent 70%);top:-10%;left:-5%;}
.bg-atmosphere .orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(240,104,88,0.12),transparent 70%);bottom:-15%;right:-5%;}
.bg-atmosphere .orb-3{width:350px;height:350px;background:radial-gradient(circle,rgba(126,184,138,0.1),transparent 70%);top:40%;left:50%;}
.bg-atmosphere .orb-4{width:300px;height:300px;background:radial-gradient(circle,rgba(79,195,247,0.08),transparent 70%);top:10%;right:20%;}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1);}33%{transform:translate(30px,-40px) scale(1.05);}66%{transform:translate(-20px,20px) scale(0.95);}100%{transform:translate(15px,-15px) scale(1.02);}}

.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,rgba(17,17,24,0.96),rgba(8,8,12,0.98));backdrop-filter:blur(20px);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;overflow-y:auto;}
.sidebar-header{padding:1.4rem 1.2rem 1.2rem;}
.sidebar-brand{font-family:var(--font-display);font-size:0.95rem;font-weight:700;display:flex;align-items:center;gap:0.6rem;}
.sidebar-brand-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),rgba(232,168,56,0.6));display:flex;align-items:center;justify-content:center;color:#08080c;font-size:0.85rem;}
.sidebar-brand-sub{font-size:0.56rem;color:var(--fg-dim);margin-top:0.3rem;}
.sidebar-nav{flex:1;padding:0.35rem 0.75rem;display:flex;flex-direction:column;gap:0.25rem;}
.sidebar-section-label{font-family:var(--font-display);font-size:0.54rem;font-weight:600;color:var(--fg-dim);letter-spacing:0.14em;padding:0.8rem 0.75rem 0.4rem;}
.sidebar-item{display:flex;align-items:center;gap:0.65rem;padding:0.65rem 0.75rem;border-radius:12px;cursor:pointer;transition:all 0.3s;border:1px solid transparent;}
.sidebar-item .icon-wrap{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);color:var(--fg-dim);font-size:0.82rem;}
.sidebar-item .label{font-family:var(--font-display);font-size:0.76rem;font-weight:500;color:var(--fg-muted);}
.sidebar-item:hover{background:rgba(255,255,255,0.02);}
.sidebar-item.active{background:linear-gradient(135deg,var(--accent-soft),rgba(232,168,56,0.02));border-color:rgba(232,168,56,0.15);}
.sidebar-item.active .label{color:var(--fg);font-weight:600;}
.sidebar-item.active .icon-wrap{background:linear-gradient(135deg,rgba(232,168,56,0.2),rgba(232,168,56,0.08));color:var(--accent);}
.sidebar-footer{padding:1rem;border-top:1px solid var(--border);}
.timer-bar-track{width:100%;height:3px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;}
.timer-bar-fill{height:100%;background:linear-gradient(90deg,var(--sage),rgba(126,184,138,0.6));transition:width 1s linear;}

.main-content{flex:1;padding:1.8rem 2rem;}
.dashboard-container{max-width:1400px;margin:0 auto;}
.page-header{margin-bottom:1.4rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.6rem;}
.page-title{font-family:var(--font-display);font-size:1.65rem;font-weight:700;}
.accent-word{color:var(--accent);}
.qris-word{color:var(--qris-primary);}
.header-actions{display:flex;align-items:center;gap:0.5rem;}
.status-badge{display:inline-flex;align-items:center;gap:0.35rem;padding:0.3rem 0.7rem;border-radius:18px;background:rgba(126,184,138,0.06);border:1px solid rgba(126,184,138,0.15);font-size:0.64rem;color:var(--sage);}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--sage);animation:dotPulse 2s infinite;}
@keyframes dotPulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.refresh-btn,.logout-header-btn{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--fg-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.78rem;transition:all 0.25s;}
.refresh-btn:hover,.logout-header-btn:hover{background:rgba(255,255,255,0.07);color:var(--fg-muted);}
.refresh-btn.spinning i{animation:spin 0.7s linear infinite;}
.sticky-top{position:sticky;top:0;z-index:10;background:var(--bg);padding:0.4rem 0;margin-bottom:0.8rem;}
.search-bar{position:relative;margin-bottom:0.6rem;}
.search-input{width:100%;padding:0.65rem 2.5rem 0.65rem 2.5rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);color:var(--fg);font-family:var(--font-body);font-size:0.8rem;transition:all 0.25s;}
.search-input:focus{border-color:rgba(232,168,56,0.35);outline:none;}
.search-clear{position:absolute;right:0.6rem;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:7px;display:none;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--fg-dim);font-size:0.68rem;transition:all 0.2s;}
.search-clear.visible{display:flex;}
.search-clear:hover{background:rgba(255,255,255,0.1);color:var(--fg);}
.toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.6rem;}
.qris-type-filter{display:flex;gap:0.35rem;background:rgba(0,0,0,0.2);padding:0.18rem;border-radius:36px;border:1px solid var(--border);}
.filter-chip{background:transparent;border:none;padding:0.32rem 0.8rem;border-radius:30px;font-size:0.66rem;font-weight:500;color:var(--fg-muted);cursor:pointer;transition:all 0.25s;font-family:var(--font-body);}
.filter-chip.active{background:var(--qris-primary);color:#08080c;font-weight:600;}
.view-toggle{display:flex;gap:0.2rem;background:rgba(0,0,0,0.2);padding:0.18rem;border-radius:36px;border:1px solid var(--border);}
.view-toggle-btn{background:transparent;border:none;padding:0.32rem 0.7rem;border-radius:30px;font-size:0.66rem;font-weight:500;color:var(--fg-muted);cursor:pointer;transition:all 0.25s;font-family:var(--font-body);}
.view-toggle-btn.active{background:rgba(255,255,255,0.08);color:var(--fg);font-weight:600;}

/* ===== GRID COMPACT ===== */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:0.8rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;transition:all 0.3s;overflow:hidden;}
.card:hover{border-color:var(--border-hover);transform:translateY(-3px);box-shadow:0 12px 36px -10px rgba(0,0,0,0.5);}
.accent-strip{height:2px;}
.card-inner{padding:0.9rem 1rem 1rem;}
.card-title{font-family:var(--font-display);font-size:0.84rem;font-weight:600;line-height:1.35;}
.card-content{font-size:0.74rem;color:var(--content-color);margin-top:0.35rem;white-space:pre-wrap;word-break:break-word;line-height:1.5;}
.qris-image-preview{margin-top:0.55rem;border-radius:10px;overflow:hidden;text-align:center;background:rgba(0,0,0,0.25);border:1px solid var(--border);}
.qris-image-preview img{max-width:100%;max-height:140px;object-fit:contain;transition:transform 0.3s;display:block;margin:0 auto;padding:0.35rem;}
.card:hover .qris-image-preview img{transform:scale(1.02);}
.qris-actions{margin-top:0.55rem;display:flex;gap:0.35rem;flex-wrap:wrap;}
.btn-action{display:inline-flex;align-items:center;gap:0.3rem;padding:0.28rem 0.6rem;border-radius:18px;font-size:0.64rem;font-weight:500;cursor:pointer;border:1px solid;background:var(--accent-soft);border-color:rgba(232,168,56,0.18);color:var(--accent);transition:all 0.25s;font-family:var(--font-body);}
.btn-action:hover{background:rgba(232,168,56,0.15);border-color:rgba(232,168,56,0.3);}
.btn-action i{font-size:0.62rem;}

/* ===== LIST COMPACT ===== */
.list-row{display:grid;grid-template-columns:1fr 2fr auto;gap:0.75rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:0.7rem 0.9rem;margin-bottom:0.45rem;transition:all 0.25s;cursor:pointer;align-items:center;}
.list-row:hover{border-color:var(--border-hover);background:var(--card-hover);}
.row-title{font-family:var(--font-display);font-size:0.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-content{font-size:0.74rem;color:var(--content-color);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-actions{display:flex;gap:0.3rem;flex-shrink:0;}
.row-action-btn{background:transparent;border:1px solid var(--border);padding:0.3rem 0.5rem;border-radius:7px;cursor:pointer;color:var(--fg-dim);font-size:0.7rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.row-action-btn:hover{background:rgba(255,255,255,0.06);color:var(--fg-muted);border-color:var(--border-hover);}

/* ===== MODAL COMPACT ===== */
.modal-overlay{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all 0.35s;}
.modal-overlay.open{opacity:1;visibility:visible;}
.modal-panel{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);max-width:600px;width:92%;max-height:85vh;overflow:auto;animation:modalSlide 0.35s cubic-bezier(0.16,1,0.3,1);}
@keyframes modalSlide{from{opacity:0;transform:translateY(20px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal-header{display:flex;justify-content:flex-end;padding:0.8rem 1.2rem;}
.modal-close{width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--fg-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.82rem;transition:all 0.2s;}
.modal-close:hover{background:rgba(255,0,85,0.1);border-color:rgba(255,0,85,0.3);color:var(--coral);}
.modal-body{padding:0 1.3rem 1.3rem;}
.modal-section{margin-bottom:1rem;}
.modal-section-label{font-family:var(--font-display);font-size:0.56rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-dim);margin-bottom:0.3rem;}
.modal-section-content{font-size:0.82rem;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.modal-section-content strong{color:var(--fg);font-weight:600;}
.modal-qris-image{text-align:center;margin-top:0.8rem;border-radius:12px;overflow:hidden;background:rgba(0,0,0,0.3);border:1px solid var(--border);padding:0.6rem;}
.modal-qris-image img{max-width:100%;max-height:280px;object-fit:contain;border-radius:8px;}
.modal-actions{display:flex;gap:0.45rem;margin-top:1rem;flex-wrap:wrap;}

/* ===== STATES ===== */
.empty-state,.error-state,.loading-state{display:flex;flex-direction:column;align-items:center;padding:3rem 2rem;gap:0.8rem;text-align:center;}
.empty-icon,.error-icon{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.03);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--fg-dim);}
.empty-title{font-family:var(--font-display);font-size:0.9rem;font-weight:600;color:var(--fg-muted);}
.error-state .error-icon{color:var(--coral);border-color:rgba(240,104,88,0.2);background:rgba(240,104,88,0.05);}
.error-state span{color:var(--coral);font-size:0.8rem;}
.loading-state span{color:var(--fg-dim);font-size:0.8rem;}
.loader-ring{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
mark{background:rgba(79,195,247,0.2);color:var(--qris-primary);border-radius:3px;padding:0 2px;}
.search-result-count{font-size:0.66rem;margin-top:0.2rem;color:var(--fg-dim);}

/* ===== RESPONSIVE ===== */
@media(max-width:1100px){.cards-grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));}}
@media(max-width:900px){
.sidebar{width:100%;height:auto;position:relative;flex-direction:row;overflow-x:auto;gap:0;}
.sidebar-header{display:none;}
.sidebar-nav{flex-direction:row;padding:0.5rem;gap:0.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch;}

.sidebar-footer{display:none;}

}

.page-title{font-size:1.25rem;}
.main-content{padding:0.8rem;}
.cards-grid{grid-template-columns:1fr;}
}

<script>
/* ============================================================
   KONFIGURASI & STATE
   ============================================================ */
const LOGIN_KEY = "ruangWaktuAuth";
const VALID_USER = "Putra28";
const VALID_PASS = "Tyaaa27";

const SPREADSHEET_ID = "1VO91WJb1w2Pi4V_GO12hDl8KPkkmHkOUFxtqEmCvygM";
const GID_TAMBAHAN = "575827072";
const GID_HADIAH   = "473202279";
const GID_QRIS     = "58319050";
const GID_PROFILE  = "1187407703";

const URL_GID0     = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;
const URL_GID5     = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&gid=${GID_TAMBAHAN}`;
const URL_GID473   = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&gid=${GID_HADIAH}`;
const URL_GID_QRIS = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&gid=${GID_QRIS}`;
const URL_GID_PROF = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&gid=${GID_PROFILE}`;

let gid0Data = [], gid5Data = [], gid473Data = [], gidQrisData = [], gidProfileData = [];
let currentFilter = "gidQris", currentView = "grid", searchQuery = "", qrisTypeFilter = "all";
let isLoading = false, lastError = null;
let lastRefreshTime = null, timerRemaining = 30, timerInterval = null;

const contentArea       = document.getElementById("contentArea");
const searchInput       = document.getElementById("searchInput");
const searchClear       = document.getElementById("searchClear");
const pageTitleEl       = document.getElementById("pageTitle");
const refreshBtn        = document.getElementById("refreshBtn");
const liveDot           = document.getElementById("liveDot");
const timerBarFillEl    = document.getElementById("timerBarFill");
const timerLastUpdateEl = document.getElementById("timerLastUpdate");

/* ============================================================
   UTILITAS
   ============================================================ */
function escapeHtml(s) {
    if (!s) return "";
    return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[m]);
}

function parseGviz(text) {
    const s = text.indexOf("{"), e = text.lastIndexOf("}");
    if (s === -1 || e === -1) throw new Error("Format data tidak valid");
    return JSON.parse(text.substring(s, e + 1)).table;
}

function formatTime(d) {
    return d.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

function isImageUrl(val) {
    if (!val || typeof val !== "string") return false;
    return /\.(jpg|jpeg|png|webp|gif)(\?.*)?$/i.test(val) ||
           val.includes("drive.google.com/uc?id=") ||
           val.startsWith("data:image");
}

function detectQrisType(item) {
    const text = ((item.title || "") + " " + (item.content || "")).toLowerCase();
    if (["bca","mandiri","bri","bni","cimb","permata","bsi","bank","danamon","ocbc","maybank","btn","mega","panin","bukopin"].some(k => text.includes(k))) return "bank";
    if (["ovo","gopay","dana","linkaja","shopeepay","spay","ewallet","dompet digital","paylater","doku","sakuku"].some(k => text.includes(k))) return "ewallet";
    return "all";
}

function hideCopyTextBtn() { return currentFilter === "gidProfile"; }

/* ============================================================
   AUTH
   ============================================================ */
function isLoggedIn() { return localStorage.getItem(LOGIN_KEY) === "true"; }
function setLoggedIn(v) { v ? localStorage.setItem(LOGIN_KEY, "true") : localStorage.removeItem(LOGIN_KEY); }
function showLogin() { document.getElementById("loginModal").classList.remove("hidden"); }
function hideLogin() { document.getElementById("loginModal").classList.add("hidden"); }
function logout() { setLoggedIn(false); showLogin(); document.getElementById("appLayout").classList.remove("entering"); }

function attemptLogin(u, p) {
    if (u === VALID_USER && p === VALID_PASS) {
        setLoggedIn(true); hideLogin();
        document.getElementById("appLayout").classList.add("entering");
        bootstrapApp(); return true;
    }
    const errEl = document.getElementById("loginError");
    errEl.innerText = "Username atau password salah.";
    errEl.style.animation = "none"; void errEl.offsetWidth; errEl.style.animation = "";
    return false;
}

/* ============================================================
   FETCH DATA
   ============================================================ */
async function fetchSimple(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const table = parseGviz(await res.text());
    return (table.rows || []).map(r => ({
        title: r.c[0]?.v != null ? String(r.c[0].v).trim() : "",
        content: r.c[1]?.v != null ? String(r.c[1].v).trim() : "",
        imageUrl: "",
        raw: (r.c || []).map(c => c?.v != null ? String(c.v).trim() : "")
    }));
}

async function fetchRich(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const table = parseGviz(await res.text());
    const rows = table.rows || [];
    const items = [];
    for (const row of rows) {
        const cells = row.c || [];
        const raw = cells.map(c => c?.v != null ? String(c.v).trim() : "");
        if (raw.every(v => !v)) continue;
        let imageUrl = "";
        const textParts = [];
        for (const val of raw) {
            if (isImageUrl(val)) { if (!imageUrl) imageUrl = val; }
            else if (val) { textParts.push(val); }
        }
        items.push({ title: textParts[0] || "Informasi", content: textParts.slice(1).join("\n"), imageUrl, raw });
    }
    return items;
}

async function fetchSheetData() {
    const [r0, r5, r473, rQris, rProf] = await Promise.allSettled([
        fetchSimple(URL_GID0), fetchSimple(URL_GID5), fetchSimple(URL_GID473),
        fetchRich(URL_GID_QRIS), fetchRich(URL_GID_PROF)
    ]);
    if (r0.status === "fulfilled")      gid0Data = r0.value;
    if (r5.status === "fulfilled")      gid5Data = r5.value;
    if (r473.status === "fulfilled")    gid473Data = r473.value;
    if (rQris.status === "fulfilled")   gidQrisData = rQris.value;
    if (rProf.status === "fulfilled")   gidProfileData = rProf.value;
}

/* ============================================================
   PENCOCOKAN GAMBAR QRIS ← PROFILE
   ============================================================ */
function buildProfileImageMap() {
    const map = new Map();
    for (const p of gidProfileData) {
        if (p.imageUrl) map.set(p.title.toLowerCase().trim(), p.imageUrl);
    }
    return map;
}

function findProfileImage(qrisTitle, profileMap) {
    if (!qrisTitle) return "";
    const key = qrisTitle.toLowerCase().trim();
    if (profileMap.has(key)) return profileMap.get(key);
    let bestMatch = "", bestLen = Infinity;
    for (const [pKey, pImg] of profileMap) {
        if (key.includes(pKey) && pKey.length < bestLen && pKey.length >= 2) {
            bestMatch = pImg; bestLen = pKey.length;
        }
    }
    if (bestMatch) return bestMatch;
    bestMatch = ""; bestLen = Infinity;
    for (const [pKey, pImg] of profileMap) {
        if (pKey.includes(key) && key.length >= 2) { bestMatch = pImg; bestLen = pKey.length; }
    }
    return bestMatch;
}

/* ============================================================
   DATA YANG DITAMPILKAN
   ============================================================ */
function getActiveData() {
    switch (currentFilter) {
        case "gid0":       return gid0Data;
        case "gid5":       return gid5Data;
        case "gid473":     return gid473Data;
        case "gidProfile": return gidProfileData;
        case "gidQris": {
            const profileMap = buildProfileImageMap();
            let data = gidQrisData.map(item => {
                const matchedImage = findProfileImage(item.title, profileMap);
                return { ...item, imageUrl: matchedImage || item.imageUrl };
            });
            if (qrisTypeFilter !== "all") {
                data = data.filter(it => detectQrisType(it) === qrisTypeFilter);
            }
            return data;
        }
        default: return [];
    }
}

function getFilteredData() {
    let data = getActiveData();
    if (searchQuery.trim()) {
        const q = searchQuery.trim().toLowerCase();
        data = data.filter(it =>
            (it.title || "").toLowerCase().includes(q) ||
            (it.content || "").toLowerCase().includes(q)
        );
    }
    return data;
}

/* ============================================================
   KONFIGURASI HALAMAN PER TAB
   ============================================================ */
function getConfigKey() {
    if (currentFilter === "gidProfile") return "gidProfile";
    if (currentFilter === "gidQris")   return "qrisCombined";
    return currentFilter;
}

const PAGE_CONFIGS = {
    gid0: {
        titleHTML: '<span class="accent-word">ALL</span> PK',
        stripGradient: "linear-gradient(90deg, #e8a838, rgba(232,168,56,0.2))",
        emptyIcon: "fa-layer-group", emptyTitle: "Tidak ada data PK",
        searchPlaceholder: "Cari data PK..."
    },
    gid5: {
        titleHTML: 'Jadwal <span class="accent-word">PASARAN</span>',
        stripGradient: "linear-gradient(90deg, #f06858, rgba(240,104,88,0.2))",
        emptyIcon: "fa-calendar-days", emptyTitle: "Tidak ada jadwal",
        searchPlaceholder: "Cari jadwal..."
    },
    gid473: {
        titleHTML: 'Hadiah <span class="accent-word">TOGEL</span>',
        stripGradient: "linear-gradient(90deg, #a78bfa, rgba(167,139,250,0.2))",
        emptyIcon: "fa-trophy", emptyTitle: "Tidak ada hadiah",
        searchPlaceholder: "Cari hadiah..."
    },
    qrisCombined: {
        titleHTML: '<span class="qris-word">QRIS Payment</span>',
        stripGradient: "linear-gradient(90deg, #4fc3f7, rgba(79,195,247,0.2))",
        emptyIcon: "fa-qrcode", emptyTitle: "Tidak ada data QRIS",
        searchPlaceholder: "Cari QRIS (bank/ewallet)..."
    },
    gidProfile: {
        titleHTML: '<span class="accent-word">PROFILE</span> Bank & E-Wallet',
        stripGradient: "linear-gradient(90deg, #36d1dc, rgba(54,209,220,0.2))",
        emptyIcon: "fa-building-columns", emptyTitle: "Belum ada data profile",
        searchPlaceholder: "Cari profile bank / e-wallet..."
    }
};

function getCfg() { return PAGE_CONFIGS[getConfigKey()] || PAGE_CONFIGS.qrisCombined; }

function updatePageHeader() {
    const cfg = getCfg();
    pageTitleEl.innerHTML = cfg.titleHTML;
    searchInput.placeholder = cfg.searchPlaceholder;
    document.getElementById("qrisTypeFilterWrapper").style.display = currentFilter === "gidQris" ? "flex" : "none";
}

/* ============================================================
   TOAST & CLIPBOARD
   ============================================================ */
function showToast(msg) {
    const t = document.createElement("div");
    t.className = "toast";
    t.innerHTML = `<i class="fa-solid fa-circle-check" style="color:var(--sage);"></i> ${escapeHtml(msg)}`;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 1800);
}

async function copyText(text, label) {
    if (!text) return;
    try { await navigator.clipboard.writeText(text); showToast((label || "Teks") + " disalin"); }
    catch (e) { showToast("Gagal menyalin"); }
}

async function copyImage(url, title) {
    if (!url) return;
    try {
        const r = await fetch(url); const blob = await r.blob();
        await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
        showToast("Gambar " + (title || "") + " disalin");
    } catch (e) { showToast("Gagal menyalin gambar"); }
}

/* ============================================================
   RENDER KONTEN
   ============================================================ */
function highlightMatch(text, query) {
    if (!query || !text) return escapeHtml(text);
    const safe = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return escapeHtml(text).replace(new RegExp(`(${safe})`, "gi"), '<mark>$1</mark>');
}

function renderContent() {
    if (isLoading && !lastRefreshTime) {
        contentArea.innerHTML = `<div class="loading-state"><div class="loader-ring"></div><span>Memuat data...</span></div>`;
        return;
    }
    if (lastError && !isLoading) {
        contentArea.innerHTML = `<div class="error-state"><div class="error-icon"><i class="fa-solid fa-triangle-exclamation"></i></div><span>${escapeHtml(lastError)}</span></div>`;
        return;
    }

    const items = getFilteredData();
    const cfg = getCfg();
    const q = searchQuery.trim();
    const noCopyText = hideCopyTextBtn();
    const totalActive = getActiveData().length;
    document.getElementById("searchResultCount").innerHTML = q ? `Ditemukan <strong>${items.length}</strong> dari ${totalActive} data` : "";

    if (items.length === 0) {
        contentArea.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fa-solid ${cfg.emptyIcon}"></i></div><div class="empty-title">${cfg.emptyTitle}</div></div>`;
        return;
    }

    if (currentView === "grid") {
        contentArea.innerHTML = '<div class="cards-grid">' +
            items.map((it, i) => {
                const title = highlightMatch(it.title, q);
                const content = highlightMatch(it.content, q);
                const imgHtml = it.imageUrl
                    ? `<div class="qris-image-preview"><img src="${escapeHtml(it.imageUrl)}" loading="lazy" alt="gambar" onerror="this.parentElement.style.display='none'"></div>`
                    : "";
                const imgBtn = it.imageUrl
                    ? `<button class="btn-action copy-img-btn" data-index="${i}"><i class="fa-regular fa-image"></i> Copy Gambar</button>`
                    : "";
                const textBtn = noCopyText ? "" : `<button class="btn-action copy-text-btn" data-index="${i}"><i class="fa-regular fa-copy"></i> Copy Teks</button>`;
                return `<article class="card" data-index="${i}">
                    <div class="accent-strip" style="background:${cfg.stripGradient};"></div>
                    <div class="card-inner">
                        <h2 class="card-title">${title}</h2>
                        ${content ? `<div class="card-content">${content}</div>` : ""}
                        ${imgHtml}
                        <div class="qris-actions">${textBtn}${imgBtn}</div>
                    </div>
                </article>`;
            }).join("") + '</div>';
    } else {
        contentArea.innerHTML = '<div class="cards-list">' +
            items.map((it, i) => {
                const title = highlightMatch(it.title, q);
                const content = highlightMatch(it.content, q);
                const imgBtn = it.imageUrl
                    ? `<button class="row-action-btn copy-img-btn" data-index="${i}" title="Copy Gambar"><i class="fa-regular fa-image"></i></button>`
                    : "";
                const textBtn = noCopyText ? "" : `<button class="row-action-btn copy-text-btn" data-index="${i}" title="Copy Teks"><i class="fa-regular fa-copy"></i></button>`;
                return `<div class="list-row" data-index="${i}">
                    <div class="row-title">${title}</div>
                    <div class="row-content">${content || "—"}</div>
                    <div class="row-actions">${textBtn}${imgBtn}<button class="row-action-btn detail-btn" data-index="${i}" title="Detail"><i class="fa-solid fa-expand"></i></button></div>
                </div>`;
            }).join("") + '</div>';
    }
}

/* ============================================================
   MODAL
   ============================================================ */
function openModal(index) {
    const items = getFilteredData();
    if (!items[index]) return;
    const it = items[index];
    const cfg = getCfg();
    const noCopyText = hideCopyTextBtn();

    document.getElementById("modalAccent").style.background = cfg.stripGradient;
    document.getElementById("modalColA").innerHTML = `<strong>${escapeHtml(it.title)}</strong>`;
    let body = escapeHtml(it.content || "Tidak ada detail.");
    if (it.imageUrl) {
        body += `<div class="modal-qris-image"><img src="${escapeHtml(it.imageUrl)}" alt="gambar" onerror="this.parentElement.style.display='none'"></div>`;
    }
    document.getElementById("modalColB").innerHTML = body;

    let actions = "";
    if (!noCopyText) {
        actions += `<button class="btn-action" id="mCopyText"><i class="fa-regular fa-copy"></i> Copy Teks</button>`;
    }
    if (it.imageUrl) {
        actions += `<button class="btn-action" id="mCopyImg"><i class="fa-regular fa-image"></i> Copy Gambar</button>`;
    }
    document.getElementById("modalActions").innerHTML = actions;

    const mct = document.getElementById("mCopyText");
    if (mct) mct.onclick = () => copyText(it.content, "Teks");
    const mci = document.getElementById("mCopyImg");
    if (mci) mci.onclick = () => copyImage(it.imageUrl, it.title);

    document.getElementById("modalOverlay").classList.add("open");
}

function closeModal() { document.getElementById("modalOverlay").classList.remove("open"); }
document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
document.getElementById("modalOverlay").addEventListener("click", e => { if (e.target === document.getElementById("modalOverlay")) closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

/* ============================================================
   DELEGASI KLIK KONTEN
   ============================================================ */
contentArea.addEventListener("click", async e => {
    const idx = e.target.closest("[data-index]");
    if (!idx) return;
    const i = parseInt(idx.dataset.index);
    const items = getFilteredData();
    if (e.target.closest(".copy-text-btn")) { if (items[i]) await copyText(items[i].content, "Teks"); return; }
    if (e.target.closest(".copy-img-btn"))  { if (items[i]?.imageUrl) await copyImage(items[i].imageUrl, items[i].title); return; }
    if (e.target.closest(".detail-btn"))    { openModal(i); return; }
    openModal(i);
});

/* ============================================================
   SIDEBAR, VIEW TOGGLE, FILTER, SEARCH
   ============================================================ */
function initSidebar() {
    document.querySelectorAll(".sidebar-item").forEach(item => {
        item.addEventListener("click", () => {
            document.querySelectorAll(".sidebar-item").forEach(i => i.classList.remove("active"));
            item.classList.add("active");
            currentFilter = item.dataset.filter;
            searchQuery = ""; searchInput.value = ""; searchClear.classList.remove("visible");
            qrisTypeFilter = "all";
            document.querySelectorAll(".filter-chip").forEach(c => c.classList.toggle("active", c.dataset.type === "all"));
            updatePageHeader(); renderContent();
        });
    });
}

function initViewToggle() {
    document.querySelectorAll(".view-toggle-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".view-toggle-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active"); currentView = btn.dataset.view; renderContent();
        });
    });
}

function initQrisTypeFilter() {
    document.querySelectorAll(".filter-chip").forEach(chip => {
        chip.addEventListener("click", () => {
            if (currentFilter !== "gidQris") return;
            document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
            chip.classList.add("active"); qrisTypeFilter = chip.dataset.type; renderContent();
        });
    });
}

searchInput.addEventListener("input", () => {
    searchQuery = searchInput.value;
    searchClear.classList.toggle("visible", searchQuery.length > 0);
    renderContent();
});
searchClear.addEventListener("click", () => {
    searchInput.value = ""; searchQuery = ""; searchClear.classList.remove("visible");
    searchInput.focus(); renderContent();
});

/* ============================================================
   TIMER AUTO-REFRESH 30 DETIK
   ============================================================ */
function updateProgressBar() { timerBarFillEl.style.width = (timerRemaining / 30 * 100) + "%"; }
function updateLastRefreshLabel() {
    if (lastRefreshTime) timerLastUpdateEl.innerHTML = `<i class="fa-solid fa-circle-check" style="color:var(--sage);"></i> Update ${formatTime(lastRefreshTime)}`;
    else timerLastUpdateEl.innerHTML = `<i class="fa-regular fa-clock"></i> Menunggu`;
}

function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerRemaining = 30; updateProgressBar();
    timerInterval = setInterval(() => {
        timerRemaining--;
        if (timerRemaining <= 0) { silentRefresh(); timerRemaining = 30; }
        updateProgressBar();
    }, 1000);
}

async function silentRefresh() {
    if (isLoading) return; isLoading = true;
    try { await fetchSheetData(); lastError = null; lastRefreshTime = new Date(); updateLastRefreshLabel(); renderContent(); }
    catch (err) { lastError = err.message; }
    finally { isLoading = false; }
}

async function manualRefresh() {
    if (isLoading) return; isLoading = true;
    liveDot.classList.add("refreshing"); refreshBtn.classList.add("spinning");
    renderContent();
    try { await fetchSheetData(); lastError = null; lastRefreshTime = new Date(); updateLastRefreshLabel(); showToast("Data diperbarui"); }
    catch (err) { lastError = err.message; showToast("Gagal refresh"); }
    finally { isLoading = false; liveDot.classList.remove("refreshing"); refreshBtn.classList.remove("spinning"); renderContent(); }
}

refreshBtn.addEventListener("click", manualRefresh);

/* ============================================================
   LOAD DATA AWAL
   ============================================================ */
async function loadData() {
    isLoading = true; updatePageHeader(); renderContent();
    try { await fetchSheetData(); lastError = null; lastRefreshTime = new Date(); updateLastRefreshLabel(); }
    catch (err) { lastError = err.message; }
    finally { isLoading = false; renderContent(); startTimer(); }
}

function bootstrapApp() { loadData(); initSidebar(); initViewToggle(); initQrisTypeFilter(); }

/* ============================================================
   LOGIN EVENT LISTENERS
   ============================================================ */
document.getElementById("loginBtn").addEventListener("click", () => {
    attemptLogin(document.getElementById("loginUsername").value.trim(), document.getElementById("loginPassword").value);
});
document.getElementById("loginPassword").addEventListener("keydown", e => {
    if (e.key === "Enter") attemptLogin(document.getElementById("loginUsername").value.trim(), document.getElementById("loginPassword").value);
});
document.getElementById("loginUsername").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("loginPassword").focus();
});
document.getElementById("togglePasswordBtn").addEventListener("click", () => {
    const p = document.getElementById("loginPassword");
    const icon = document.querySelector("#togglePasswordBtn i");
    p.type = p.type === "password" ? "text" : "password";
    icon.className = p.type === "password" ? "fa-regular fa-eye" : "fa-regular fa-eye-slash";
});
document.getElementById("logoutHeaderBtn").addEventListener("click", logout);

/* ============================================================
   INISIALISASI
   ============================================================ */
if (isLoggedIn()) { hideLogin(); document.getElementById("appLayout").classList.add("entering"); bootstrapApp(); }
else { showLogin(); }
</script>
