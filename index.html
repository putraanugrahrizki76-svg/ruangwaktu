<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUANG WAKTU · Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
    --bg: #08080c;
    --bg-elevated: #111118;
    --fg: #e8e6e3;
    --fg-muted: #6e7181;
    --fg-dim: #3d3f4a;
    --neon-cyan: #00f0ff;
    --neon-magenta: #ff00e5;
    --neon-green: #39ff14;
    --border: rgba(255,255,255,0.06);
    --font-display: 'Space Grotesk', system-ui, sans-serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    min-height: 100vh; 
    background: var(--bg); 
    font-family: var(--font-body); 
    color: var(--fg); 
    overflow: hidden; 
    display: flex; 
    align-items: center; 
    justify-content: center;
}

/* ===== ANIMATED BACKGROUND ===== */
.bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: 
        linear-gradient(rgba(0,240,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
}
@keyframes gridMove { 
    0% { transform: translate(0, 0); } 
    100% { transform: translate(40px, 40px); } 
}

.bg-scanlines {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,240,255,0.03) 2px, rgba(0,240,255,0.03) 4px);
}

.bg-orb {
    position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.4; pointer-events: none; z-index: 0;
}
.orb-1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,240,255,0.2), transparent 70%); top: -10%; left: -5%; animation: float 8s ease-in-out infinite alternate; }
.orb-2 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(255,0,229,0.15), transparent 70%); bottom: -10%; right: -5%; animation: float 10s ease-in-out infinite alternate-reverse; }
@keyframes float { 0% { transform: translate(0,0); } 100% { transform: translate(30px, -40px); } }

/* ===== CORNER DECORATIONS ===== */
.corner { position: fixed; width: 50px; height: 50px; pointer-events: none; z-index: 2; }
.corner-tl { top: 20px; left: 20px; border-top: 2px solid var(--neon-cyan); border-left: 2px solid var(--neon-cyan); box-shadow: 0 0 15px rgba(0,240,255,0.3); }
.corner-tr { top: 20px; right: 20px; border-top: 2px solid var(--neon-magenta); border-right: 2px solid var(--neon-magenta); box-shadow: 0 0 15px rgba(255,0,229,0.3); }
.corner-bl { bottom: 20px; left: 20px; border-bottom: 2px solid var(--neon-green); border-left: 2px solid var(--neon-green); box-shadow: 0 0 15px rgba(57,255,20,0.3); }
.corner-br { bottom: 20px; right: 20px; border-bottom: 2px solid var(--neon-cyan); border-right: 2px solid var(--neon-cyan); box-shadow: 0 0 15px rgba(0,240,255,0.3); }

.side-label { 
    position: fixed; font-family: var(--font-display); font-size: 0.6rem; letter-spacing: 0.3em; 
    text-transform: uppercase; color: rgba(0,240,255,0.2); writing-mode: vertical-rl; pointer-events: none; z-index: 2; 
}
.side-label-left { left: 25px; top: 50%; transform: translateY(-50%); }
.side-label-right { right: 25px; top: 50%; transform: translateY(-50%) rotate(180deg); }

/* ===== LOGIN CARD ===== */
.login-container {
    position: relative; z-index: 10; width: 90%; max-width: 420px;
    background: linear-gradient(160deg, rgba(14,14,24,0.95), rgba(8,8,12,0.98));
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-radius: 24px; padding: 3rem 2.5rem 2.5rem;
    box-shadow: 0 0 0 1px rgba(0,240,255,0.1), 0 0 60px -10px rgba(0,240,255,0.15), 0 40px 80px -20px rgba(0,0,0,0.8);
    animation: cardEntry 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0; transform: translateY(30px) scale(0.95);
}
@keyframes cardEntry { to { opacity: 1; transform: translateY(0) scale(1); } }

.login-container::before {
    content: ''; position: absolute; top: 0; left: 40px; right: 40px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-magenta), transparent);
    box-shadow: 0 0 20px rgba(0,240,255,0.5); border-radius: 2px;
}
.login-container::after {
    content: ''; position: absolute; bottom: 0; left: 40px; right: 40px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon-green), var(--neon-cyan), transparent);
    box-shadow: 0 0 20px rgba(57,255,20,0.4); border-radius: 2px;
}

/* Icon */
.login-icon { text-align: center; margin-bottom: 1.5rem; position: relative; }
.login-icon .ring {
    display: inline-flex; align-items: center; justify-content: center; width: 70px; height: 70px; border-radius: 50%; position: relative;
}
.login-icon .ring::before {
    content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 2px solid transparent;
    border-top-color: var(--neon-cyan); border-right-color: var(--neon-magenta); animation: spin 3s linear infinite;
}
.login-icon .ring::after {
    content: ''; position: absolute; inset: -10px; border-radius: 50%; border: 1px solid transparent;
    border-bottom-color: rgba(57,255,20,0.4); animation: spin 5s linear infinite reverse;
}
@keyframes spin { to { transform: rotate(360deg); } }
.login-icon i { 
    font-size: 1.8rem; color: var(--neon-cyan); position: relative; z-index: 2; 
    filter: drop-shadow(0 0 15px rgba(0,240,255,0.6)); 
    background: radial-gradient(circle, rgba(0,240,255,0.1) 0%, transparent 70%); 
    width: 70px; height: 70px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%;
}

/* Text */
.login-title { 
    font-family: var(--font-display); font-size: 2rem; font-weight: 700; text-align: center; 
    letter-spacing: 0.12em; text-transform: uppercase; color: #fff; margin-bottom: 0.3rem;
    text-shadow: 0 0 10px rgba(255,0,229,0.6), 0 0 30px rgba(255,0,229,0.3);
    animation: glitchText 4s infinite;
}
@keyframes glitchText {
    0%, 90%, 100% { transform: translate(0); }
    92% { transform: translate(-2px, 1px); }
    94% { transform: translate(2px, -1px); }
    96% { transform: translate(-1px, -1px); }
    98% { transform: translate(1px, 2px); }
}
.login-subtitle { 
    text-align: center; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.35em; 
    text-transform: uppercase; color: var(--neon-magenta); margin-bottom: 2.5rem; 
    text-shadow: 0 0 10px rgba(255,0,229,0.4);
}

/* Input */
.input-group { margin-bottom: 1.5rem; position: relative; }
.input-label { 
    display: block; font-family: var(--font-display); font-size: 0.7rem; font-weight: 600; 
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--neon-cyan); margin-bottom: 0.5rem; 
    text-shadow: 0 0 8px rgba(0,240,255,0.3);
}
.input-wrapper { position: relative; }
.input-wrapper input {
    width: 100%; padding: 0.85rem 1rem 0.85rem 2.8rem; 
    background: rgba(0,240,255,0.03); border: 1px solid rgba(0,240,255,0.15); border-radius: 12px;
    font-family: var(--font-body); font-size: 0.9rem; color: var(--fg); transition: all 0.3s ease;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.4);
}
.input-wrapper input:focus { 
    outline: none; border-color: rgba(0,240,255,0.6); background: rgba(0,240,255,0.05); 
    box-shadow: 0 0 0 3px rgba(0,240,255,0.1), 0 0 20px -5px rgba(0,240,255,0.3), inset 0 2px 10px rgba(0,0,0,0.3); 
}
.input-icon { 
    position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); 
    color: rgba(0,240,255,0.4); font-size: 0.9rem; transition: color 0.3s; pointer-events: none; 
}
.input-wrapper input:focus ~ .input-icon { color: var(--neon-cyan); text-shadow: 0 0 8px rgba(0,240,255,0.5); }

.toggle-pass {
    position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; 
    color: var(--fg-dim); cursor: pointer; font-size: 0.9rem; transition: all 0.2s; padding: 5px;
}
.toggle-pass:hover { color: var(--neon-cyan); text-shadow: 0 0 8px rgba(0,240,255,0.5); }

/* Button */
.login-btn {
    width: 100%; padding: 1rem; position: relative; overflow: hidden; margin-top: 0.5rem;
    background: linear-gradient(135deg, rgba(0,240,255,0.1), rgba(255,0,229,0.05)); 
    border: 1px solid rgba(0,240,255,0.4); border-radius: 14px;
    font-family: var(--font-display); font-weight: 700; font-size: 0.95rem; color: #fff;
    cursor: pointer; transition: all 0.3s ease; letter-spacing: 0.15em; text-transform: uppercase;
    text-shadow: 0 0 10px rgba(0,240,255,0.5); 
    box-shadow: 0 0 25px -5px rgba(0,240,255,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center; gap: 0.7rem;
}
.login-btn::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,240,255,0.2), rgba(255,0,229,0.1), transparent);
    transition: left 0.6s ease;
}
.login-btn:hover { 
    transform: translateY(-3px); border-color: rgba(0,240,255,0.8); 
    box-shadow: 0 0 40px -5px rgba(0,240,255,0.5), 0 15px 30px -10px rgba(0,240,255,0.2); 
}
.login-btn:hover::before { left: 100%; }
.login-btn:active { transform: translateY(1px); }
.login-btn i { font-size: 0.85rem; }

/* Error Message */
.login-error { 
    min-height: 1.5rem; margin-top: 1rem; text-align: center; font-size: 0.8rem; color: #ff0055; 
    font-weight: 500; text-shadow: 0 0 8px rgba(255,0,85,0.4); transition: all 0.3s; 
}
.login-error.show { animation: shake 0.4s ease; }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-4px); } }

/* Footer note */
.login-footer { 
    margin-top: 2rem; text-align: center; font-size: 0.6rem; color: rgba(0,240,255,0.3); 
    letter-spacing: 0.2em; text-transform: uppercase; padding-top: 1.2rem; border-top: 1px solid rgba(0,240,255,0.08); 
}

/* ===== DASHBOARD SECTION (Hidden initially) ===== */
.dashboard-screen {
    position: fixed; inset: 0; z-index: 100; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; visibility: hidden; transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
.dashboard-screen.active { opacity: 1; visibility: visible; }
.dash-title { 
    font-family: var(--font-display); font-size: 3rem; font-weight: 700; letter-spacing: 0.1em; 
    background: linear-gradient(135deg, var(--neon-cyan), #fff, var(--neon-magenta)); 
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; 
    margin-bottom: 1rem; 
}
.dash-sub { font-family: var(--font-mono); font-size: 0.8rem; color: var(--neon-green); letter-spacing: 0.2em; margin-bottom: 3rem; }
.logout-btn { 
    padding: 0.8rem 2rem; background: rgba(255,0,85,0.1); border: 1px solid rgba(255,0,85,0.3); 
    border-radius: 10px; color: #ff0055; font-family: var(--font-display); font-weight: 600; 
    cursor: pointer; transition: all 0.3s; letter-spacing: 0.1em;
}
.logout-btn:hover { background: rgba(255,0,85,0.2); border-color: rgba(255,0,85,0.6); box-shadow: 0 0 20px rgba(255,0,85,0.2); }
</style>
</head>
<body>

<!-- Background Elements -->
<div class="bg-grid"></div>
<div class="bg-scanlines"></div>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div class="side-label side-label-left">SECURE ACCESS v2.0</div>
<div class="side-label side-label-right">RUANG WAKTU SYSTEM</div>

<!-- Login Form -->
<div class="login-container" id="loginSection">
    <div class="login-icon">
        <div class="ring">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
    </div>
    <div class="login-title">RUANG WAKTU</div>
    <div class="login-subtitle">Secure Data Center</div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="input-group">
            <label class="input-label">Username</label>
            <div class="input-wrapper">
                <input type="text" id="username" autocomplete="off" required placeholder="Masukkan username">
                <i class="fa-regular fa-user input-icon"></i>
            </div>
        </div>
        <div class="input-group">
            <label class="input-label">Password</label>
            <div class="input-wrapper">
                <input type="password" id="password" required placeholder="Masukkan password">
                <i class="fa-solid fa-lock input-icon"></i>
                <button type="button" class="toggle-pass" onclick="togglePassword()"><i class="fa-regular fa-eye" id="eyeIcon"></i></button>
            </div>
        </div>
        <button type="submit" class="login-btn">
            <i class="fa-solid fa-arrow-right-to-bracket"></i> MASUK
        </button>
    </form>

    <div class="login-error" id="errorMsg"></div>
    
    <div class="login-footer">Ruang Waktu · Data Center Interface</div>
</div>

<!-- Dashboard Screen (Initially Hidden) -->
<div class="dashboard-screen" id="dashboardScreen">
    <div class="dash-title">DASHBOARD</div>
    <div class="dash-sub">SELAMAT DATANG DI DATA CENTER</div>
    <button class="logout-btn" onclick="handleLogout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> KELUAR</button>
</div>

<script>
    // Hardcoded valid credentials
    const VALID_USER = "Putra28";
    const VALID_PASS = "Tyaaa27";
    const AUTH_KEY = "ruangWaktuAuth";

    // Check if already logged in on load
    window.onload = () => {
        if (localStorage.getItem(AUTH_KEY) === "true") {
            showDashboard();
        }
    };

    function handleLogin(e) {
        e.preventDefault();
        const user = document.getElementById("username").value.trim();
        const pass = document.getElementById("password").value;
        const errorEl = document.getElementById("errorMsg");

        if (user === VALID_USER && pass === VALID_PASS) {
            // Success
            localStorage.setItem(AUTH_KEY, "true");
            errorEl.textContent = "";
            showDashboard();
        } else {
            // Failed
            errorEl.textContent = "Username atau password salah!";
            errorEl.classList.remove("show");
            void errorEl.offsetWidth; // trigger reflow
            errorEl.classList.add("show");
        }
        return false;
    }

    function showDashboard() {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("dashboardScreen").classList.add("active");
    }

    function handleLogout() {
        localStorage.removeItem(AUTH_KEY);
        document.getElementById("dashboardScreen").classList.remove("active");
        document.getElementById("loginSection").style.display = "block";
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
        document.getElementById("errorMsg").textContent = "";
    }

    function togglePassword() {
        const passInput = document.getElementById("password");
        const eyeIcon = document.getElementById("eyeIcon");
        if (passInput.type === "password") {
            passInput.type = "text";
            eyeIcon.className = "fa-regular fa-eye-slash";
        } else {
            passInput.type = "password";
            eyeIcon.className = "fa-regular fa-eye";
        }
    }
</script>
</body>
</html>
