<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>RUANG WAKTU - QRIS VISUAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
--bg: #08080c;
--bg-elevated: #111118;
--card: rgba(255,255,255,0.03);
--card-hover: rgba(255,255,255,0.06);
--border: rgba(255,255,255,0.06);
--border-hover: rgba(255,255,255,0.12);
--fg: #e8e6e3;
--fg-muted: #6e7181;
--fg-dim: #3d3f4a;
--accent: #e8a838;
--accent-glow: rgba(232,168,56,0.15);
--accent-soft: rgba(232,168,56,0.08);
--coral: #f06858;
--sage: #7eb88a;
--sky: #5ba4cf;
--lavender: #a78bfa;
--rose: #f472b6;
--teal: #2dd4bf;
--content-color: #7dd3e8;
--qris-primary: #4fc3f7;
--qris-glow: rgba(79,195,247,0.12);
--qris-soft: rgba(79,195,247,0.06);
--radius: 16px;
--radius-lg: 22px;
--sidebar-w: 260px;
--font-display: 'Space Grotesk', system-ui, sans-serif;
--font-body: 'DM Sans', system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
min-height: 100vh; background: var(--bg);
font-family: var(--font-body); color: var(--fg);
line-height: 1.6; overflow-x: hidden;
}

.bg-atmosphere {
position: fixed; inset: 0; z-index: 0;
pointer-events: none; overflow: hidden;
}
.bg-atmosphere .orb {
position: absolute; border-radius: 50%;
filter: blur(120px); opacity: 0.4;
animation: orbFloat 20s ease-in-out infinite alternate;
}
.bg-atmosphere .orb-1 {
width: 500px; height: 500px;
background: radial-gradient(circle, rgba(232,168,56,0.18), transparent 70%);
top: -10%; left: -5%; animation-duration: 25s;
}
.bg-atmosphere .orb-2 {
width: 400px; height: 400px;
background: radial-gradient(circle, rgba(240,104,88,0.12), transparent 70%);
bottom: -15%; right: -5%; animation-duration: 30s; animation-delay: -5s;
}
.bg-atmosphere .orb-3 {
width: 350px; height: 350px;
background: radial-gradient(circle, rgba(126,184,138,0.1), transparent 70%);
top: 40%; left: 50%; animation-duration: 22s; animation-delay: -10s;
}
.bg-atmosphere .orb-4 {
width: 300px; height: 300px;
background: radial-gradient(circle, rgba(79,195,247,0.08), transparent 70%);
top: 10%; right: 20%; animation-duration: 28s; animation-delay: -8s;
}
@keyframes orbFloat {
0% { transform: translate(0, 0) scale(1); }
33% { transform: translate(30px, -40px) scale(1.05); }
66% { transform: translate(-20px, 20px) scale(0.95); }
100% { transform: translate(15px, -15px) scale(1.02); }
}
.bg-atmosphere::after {
content: ''; position: absolute; inset: 0;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
background-size: 128px; opacity: 0.5;
}

.app-layout {
display: flex; min-height: 100vh;
position: relative; z-index: 1;
}

.sidebar {
width: var(--sidebar-w); 
background: linear-gradient(180deg, rgba(17,17,24,0.95) 0%, rgba(8,8,12,0.98) 100%);
backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
border-right: 1px solid var(--border);
display: flex; flex-direction: column;
padding: 0; 
position: sticky; top: 0; height: 100vh; flex-shrink: 0;
overflow: hidden;
}
.sidebar::before {
content: ''; position: absolute; top: 0; right: 0;
width: 1px; height: 100%;
background: linear-gradient(180deg, transparent 0%, rgba(232,168,56,0.08) 30%, rgba(232,168,56,0.15) 50%, rgba(232,168,56,0.08) 70%, transparent 100%);
pointer-events: none;
}
.sidebar-glow {
position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
width: 200px; height: 120px;
background: radial-gradient(ellipse, rgba(232,168,56,0.06), transparent 70%);
pointer-events: none; filter: blur(30px);
}

.sidebar-header {
padding: 1.75rem 1.5rem 1.5rem;
position: relative;
}
.sidebar-brand {
font-family: var(--font-display);
font-size: 1.05rem; font-weight: 700;
letter-spacing: 0.04em;
color: var(--fg);
display: flex; align-items: center; gap: 0.7rem;
}
.sidebar-brand-icon {
width: 36px; height: 36px; border-radius: 12px;
background: linear-gradient(135deg, var(--accent), rgba(232,168,56,0.6));
display: flex; align-items: center; justify-content: center;
font-size: 0.85rem; color: #08080c;
box-shadow: 0 4px 16px rgba(232,168,56,0.2);
position: relative;
}
.sidebar-brand-icon::after {
content: ''; position: absolute; inset: -2px;
border-radius: 14px;
background: linear-gradient(135deg, rgba(232,168,56,0.3), transparent 60%);
z-index: -1; opacity: 0;
transition: opacity 0.4s ease;
}
.sidebar:hover .sidebar-brand-icon::after { opacity: 1; }
.sidebar-brand-sub {
font-size: 0.6rem; font-weight: 500;
letter-spacing: 0.12em; text-transform: uppercase;
color: var(--fg-dim); margin-top: 0.35rem;
padding-left: 0.05rem;
}

.sidebar-nav {
flex: 1; padding: 0.5rem 1rem;
display: flex; flex-direction: column; gap: 0.35rem;
overflow-y: auto;
}
.sidebar-nav::-webkit-scrollbar { width: 0; }

.sidebar-section-label {
font-family: var(--font-display);
font-size: 0.58rem; font-weight: 600;
color: var(--fg-dim); letter-spacing: 0.16em;
text-transform: uppercase; padding: 1rem 0.85rem 0.55rem;
display: flex; align-items: center; gap: 0.6rem;
}
.sidebar-section-label::after {
content: ''; flex: 1; height: 1px;
background: linear-gradient(90deg, var(--border), transparent);
}

.sidebar-item {
display: flex; align-items: center; gap: 0.8rem;
padding: 0.8rem 0.85rem; border-radius: 14px;
cursor: pointer; transition: all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
position: relative; border: 1px solid transparent;
overflow: hidden;
}
.sidebar-item::before {
content: ''; position: absolute; inset: 0;
border-radius: 14px;
background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,0.04), transparent 60%);
opacity: 0; transition: opacity 0.3s ease;
pointer-events: none;
}
.sidebar-item:hover::before { opacity: 1; }
.sidebar-item .icon-wrap {
width: 38px; height: 38px; border-radius: 11px;
display: flex; align-items: center; justify-content: center;
font-size: 0.82rem; 
background: rgba(255,255,255,0.03);
color: var(--fg-dim); 
transition: all 0.3s cubic-bezier(0.25,0.46,0.45,0.94); 
flex-shrink: 0;
border: 1px solid rgba(255,255,255,0.03);
}
.sidebar-item .label {
font-family: var(--font-display);
font-size: 0.82rem; font-weight: 500;
color: var(--fg-muted); transition: all 0.3s ease;
white-space: nowrap;
}
.sidebar-item .label-sub {
font-size: 0.6rem; font-weight: 400;
color: var(--fg-dim); margin-top: 0.1rem;
display: block; line-height: 1.3;
}
.sidebar-item .item-arrow {
margin-left: auto; font-size: 0.6rem; color: var(--fg-dim);
opacity: 0; transform: translateX(-4px);
transition: all 0.3s ease;
}
.sidebar-item:hover .item-arrow { opacity: 0.5; transform: translateX(0); }

.sidebar-item:hover { 
background: rgba(255,255,255,0.025); 
border-color: rgba(255,255,255,0.04);
}
.sidebar-item:hover .label { color: var(--fg); }
.sidebar-item:hover .icon-wrap { 
background: rgba(255,255,255,0.06); 
color: var(--fg-muted);
border-color: rgba(255,255,255,0.06);
transform: scale(1.02);
}

/* Styling Khusus QRIS Sidebar */
.sidebar-item.qris-item .qris-preview {
display: none; /* Hidden on normal items */
}

.sidebar-item.active.qris-item { 
background: linear-gradient(135deg, var(--qris-soft), rgba(79,195,247,0.02)); 
border-color: rgba(79,195,247,0.15);
box-shadow: 0 4px 20px -6px rgba(79,195,247,0.1),
            inset 0 1px 0 rgba(79,195,247,0.06);
padding: 0.75rem; 
}
.sidebar-item.active.qris-item .label { 
color: var(--fg); font-weight: 600;
}
.sidebar-item.active.qris-item .label-sub { color: rgba(79,195,247,0.5); }
.sidebar-item.active.qris-item .icon-wrap { 
background: linear-gradient(135deg, rgba(79,195,247,0.2), rgba(79,195,247,0.08)); 
color: var(--qris-primary); 
border-color: rgba(79,195,247,0.18);
box-shadow: 0 2px 10px -2px rgba(79,195,247,0.15);
}
.sidebar-item.active.qris-item .item-arrow { opacity: 1; color: var(--qris-primary); transform: translateX(0); }
.sidebar-item.active.qris-item::after {
content: ''; position: absolute; left: 0; top: 20%; 
width: 3px; height: 60%;
background: var(--qris-primary); border-radius: 0 4px 4px 0;
box-shadow: 0 0 12px rgba(79,195,247,0.4);
animation: activeBarIn 0.35s cubic-bezier(0.2,0.9,0.3,1) forwards;
}

/* Area Gambar di Sidebar saat Aktif */
.qris-sidebar-container {
display: none;
flex-direction: column;
gap: 0.75rem;
padding: 0 0.5rem;
margin-top: 0.5rem;
margin-bottom: 0.5rem;
border-top: 1px solid rgba(79,195,247,0.1);
border-bottom: 1px solid rgba(79,195,247,0.1);
padding-top: 1rem;
padding-bottom: 1rem;
animation: slideDown 0.3s ease;
}
.qris-sidebar-container.active { display: flex; }
.qris-mini-card {
display: flex; align-items: center; gap: 0.75rem;
padding: 0.4rem; border-radius: 10px;
transition: background 0.2s;
}
.qris-mini-card:hover { background: rgba(255,255,255,0.04); }
.qris-mini-img {
width: 48px; height: 48px;
border-radius: 8px;
object-fit: cover;
background: #000;
border: 1px solid rgba(79,195,247,0.2);
}
.qris-mini-info { flex: 1; min-width: 0; }
.qris-mini-title {
font-size: 0.7rem; font-weight: 600; color: var(--fg);
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
margin-bottom: 2px;
}
.qris-mini-detail {
font-size: 0.6rem; color: var(--fg-muted);
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.qris-mini-btn {
font-size: 0.6rem; color: var(--qris-primary);
background: rgba(79,195,247,0.1);
padding: 4px 8px; border-radius: 6px;
font-weight: 600;
}
@keyframes slideDown {
from { opacity: 0; transform: translateY(-10px); }
to { opacity: 1; transform: translateY(0); }
}

.sidebar-item.active:not(.qris-item) { 
background: linear-gradient(135deg, var(--accent-soft), rgba(232,168,56,0.03)); 
border-color: rgba(232,168,56,0.12);
box-shadow: 0 4px 20px -6px rgba(232,168,56,0.1),
            inset 0 1px 0 rgba(232,168,56,0.06);
}
.sidebar-item.active:not(.qris-item) .label { 
color: var(--fg); font-weight: 600;
}
.sidebar-item.active:not(.qris-item) .label-sub { color: rgba(232,168,56,0.5); }
.sidebar-item.active:not(.qris-item) .icon-wrap { 
background: linear-gradient(135deg, rgba(232,168,56,0.2), rgba(232,168,56,0.1)); 
color: var(--accent); 
border-color: rgba(232,168,56,0.15);
box-shadow: 0 2px 10px -2px rgba(232,168,56,0.15);
}
.sidebar-item.active:not(.qris-item) .item-arrow { opacity: 1; color: var(--accent); transform: translateX(0); }
.sidebar-item.active:not(.qris-item)::after {
content: ''; position: absolute; left: 0; top: 20%; 
width: 3px; height: 60%;
background: var(--accent); border-radius: 0 4px 4px 0;
box-shadow: 0 0 12px rgba(232,168,56,0.4);
animation: activeBarIn 0.35s cubic-bezier(0.2,0.9,0.3,1) forwards;
}
@keyframes activeBarIn {
from { height: 0; top: 50%; opacity: 0; }
to { height: 60%; top: 20%; opacity: 1; }
}

.sidebar-footer {
padding: 1.25rem 1.25rem 1.5rem;
border-top: 1px solid var(--border);
position: relative;
}
.sidebar-footer::before {
content: ''; position: absolute; top: -1px; left: 1.25rem; right: 1.25rem;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(232,168,56,0.08), transparent);
}
.sidebar-status-card {
background: rgba(255,255,255,0.02);
border: 1px solid var(--border);
border-radius: 14px; padding: 0.9rem 1rem;
display: flex; flex-direction: column; gap: 0.6rem;
}
.sidebar-status-row {
display: flex; align-items: center; gap: 0.5rem;
}
.sidebar-status-dot {
width: 6px; height: 6px; border-radius: 50%;
background: var(--sage);
box-shadow: 0 0 8px rgba(126,184,138,0.3);
animation: pulse 2s ease-in-out infinite;
flex-shrink: 0;
}
.sidebar-status-dot.syncing {
background: var(--accent);
box-shadow: 0 0 8px rgba(232,168,56,0.3);
}
.sidebar-status-text {
font-size: 0.65rem; font-weight: 500;
font-family: var(--font-display);
color: var(--fg-muted);
}
.sidebar-status-text small {
font-weight: 400; color: var(--fg-dim);
font-family: var(--font-body);
margin-left: 0.25rem;
}
.sidebar-refresh-row {
display: flex; align-items: center; gap: 0.4rem;
}
.sidebar-refresh-row i {
font-size: 0.6rem; color: var(--fg-dim);
transition: color 0.3s ease;
}
.sidebar-refresh-row i.syncing {
color: var(--accent);
animation: spin 0.8s linear infinite;
}
.sidebar-refresh-row span {
font-size: 0.58rem; color: var(--fg-dim);
font-family: var(--font-display);
}

@keyframes pulse {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.5; transform: scale(0.8); }
}
@keyframes spin { to { transform: rotate(360deg); } }

.main-content { flex: 1; padding: 2.5rem 3rem; min-width: 0; }
.dashboard-container { max-width: 1280px; margin: 0 auto; }

.page-header {
margin-bottom: 2rem; display: flex; align-items: flex-end;
justify-content: space-between; gap: 1rem; flex-wrap: wrap;
}
.page-title {
font-family: var(--font-display);
font-size: 2rem; font-weight: 700;
color: var(--fg); letter-spacing: -0.03em; line-height: 1.2;
}
.page-title .accent-word { color: var(--accent); }
.page-title .qris-word { color: var(--qris-primary); }
.page-subtitle { margin-top: 0.4rem; font-size: 0.85rem; color: var(--fg-muted); }
.page-header-right { display: flex; align-items: center; gap: 0.5rem; }
.status-badge {
display: inline-flex; align-items: center; gap: 0.4rem;
font-size: 0.7rem; font-weight: 500; color: var(--sage);
background: rgba(126,184,138,0.08);
border: 1px solid rgba(126,184,138,0.15);
padding: 0.35rem 0.75rem; border-radius: 20px;
transition: all 0.3s ease;
}
.status-badge.syncing {
color: var(--accent);
background: rgba(232,168,56,0.08);
border-color: rgba(232,168,56,0.2);
}
.status-badge .live-dot {
width: 5px; height: 5px; background: var(--sage);
border-radius: 50%; animation: pulse 1.5s ease-in-out infinite;
transition: background 0.3s ease;
}
.status-badge.syncing .live-dot { background: var(--accent); }

.sticky-top {
position: sticky;
top: 0;
z-index: 100;
padding: 0.65rem 0 0.5rem;
margin-bottom: 1.25rem;
background: var(--bg);
border-bottom: 1px solid var(--border);
box-shadow: 0 12px 32px -10px rgba(0,0,0,0.5);
transition: box-shadow 0.3s ease, border-color 0.3s ease;
}

.search-bar {
position: relative;
margin-bottom: 0.75rem;
}
.search-bar .search-icon {
position: absolute; left: 1rem; top: 50%;
transform: translateY(-50%);
font-size: 0.85rem; color: var(--fg-dim);
pointer-events: none;
transition: color 0.25s ease;
}
.search-bar .search-input {
width: 100%; padding: 0.8rem 3rem 0.8rem 2.85rem;
font-family: var(--font-body); font-size: 0.88rem;
color: var(--fg); background: var(--card);
border: 1px solid var(--border);
border-radius: var(--radius);
outline: none; transition: all 0.3s ease;
}
.search-bar .search-input::placeholder { color: var(--fg-dim); font-size: 0.84rem; }
.search-bar .search-input:focus {
border-color: rgba(232,168,56,0.35);
background: rgba(255,255,255,0.04);
box-shadow: 0 0 0 3px rgba(232,168,56,0.06), 0 8px
