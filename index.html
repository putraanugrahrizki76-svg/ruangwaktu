<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RUANG WAKTU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #08080c;
            --bg-elevated: #111118;
            --card: rgba(255,255,255,0.03);
            --card-hover: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.12);
            --fg: #e8e6e3;
            --fg-muted: #6e7181;
            --fg-dim: #3d3f4a;
            --accent: #e8a838;
            --accent-glow: rgba(232,168,56,0.15);
            --coral: #f06858;
            --sage: #7eb88a;
            --sky: #5ba4cf;
            --lavender: #a78bfa;
            --rose: #f472b6;
            --teal: #2dd4bf;
            --radius: 16px;
            --radius-lg: 22px;
            --sidebar-w: 240px;
            --font-display: 'Space Grotesk', system-ui, sans-serif;
            --font-body: 'DM Sans', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            min-height: 100vh;
            background: var(--bg);
            font-family: var(--font-body);
            color: var(--fg);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* === BACKGROUND ATMOSPHERE === */
        .bg-atmosphere {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-atmosphere .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            animation: orbFloat 20s ease-in-out infinite alternate;
        }

        .bg-atmosphere .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(232,168,56,0.18), transparent 70%);
            top: -10%; left: -5%;
            animation-duration: 25s;
        }

        .bg-atmosphere .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(240,104,88,0.12), transparent 70%);
            bottom: -15%; right: -5%;
            animation-duration: 30s;
            animation-delay: -5s;
        }

        .bg-atmosphere .orb-3 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(126,184,138,0.1), transparent 70%);
            top: 40%; left: 50%;
            animation-duration: 22s;
            animation-delay: -10s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
            100% { transform: translate(15px, -15px) scale(1.02); }
        }

        /* Grain overlay */
        .bg-atmosphere::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            background-size: 128px;
            opacity: 0.5;
        }

        /* === LAYOUT === */
        .app-layout {
            display: flex;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* === SIDEBAR === */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--bg-elevated);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 2rem 1rem;
            gap: 0.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            flex-shrink: 0;
        }

        .sidebar-brand {
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--fg-muted);
            padding: 0 0.85rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sidebar-brand .dot {
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-glow);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0.85rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            border: 1px solid transparent;
        }

        .sidebar-item .icon-wrap {
            width: 34px; height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.04);
            color: var(--fg-muted);
            transition: all 0.25s ease;
            flex-shrink: 0;
        }

        .sidebar-item .label {
            font-family: var(--font-display);
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--fg-muted);
            transition: color 0.25s ease;
            white-space: nowrap;
        }

        .sidebar-item .count {
            margin-left: auto;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--fg-dim);
            background: rgba(255,255,255,0.04);
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            transition: all 0.25s ease;
            min-width: 24px;
            text-align: center;
        }

        .sidebar-item:hover {
            background: rgba(255,255,255,0.03);
            border-color: var(--border);
        }

        .sidebar-item:hover .label { color: var(--fg); }
        .sidebar-item:hover .icon-wrap {
            background: rgba(255,255,255,0.06);
            color: var(--fg);
        }

        .sidebar-item.active {
            background: var(--accent-glow);
            border-color: rgba(232,168,56,0.2);
        }

        .sidebar-item.active .label { color: var(--accent); }
        .sidebar-item.active .icon-wrap {
            background: rgba(232,168,56,0.15);
            color: var(--accent);
        }

        .sidebar-item.active .count {
            background: rgba(232,168,56,0.15);
            color: var(--accent);
        }

        .sidebar-item.active::before {
            content: '';
            position: absolute;
            left: -1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--accent);
            border-radius: 0 4px 4px 0;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 1rem 0.85rem 0;
            border-top: 1px solid var(--border);
        }

        .sidebar-footer-text {
            font-size: 0.65rem;
            color: var(--fg-dim);
            line-height: 1.5;
        }

        /* === MAIN === */
        .main-content {
            flex: 1;
            padding: 2.5rem 3rem;
            min-width: 0;
        }

        .dashboard-container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* Header */
        .page-header {
            margin-bottom: 2.5rem;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .page-header-left {}

        .page-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            color: var(--fg);
            letter-spacing: -0.03em;
            line-height: 1.2;
        }

        .page-title .accent-word {
            color: var(--accent);
        }

        .page-subtitle {
            margin-top: 0.4rem;
            font-size: 0.85rem;
            color: var(--fg-muted);
            font-weight: 400;
        }

        .page-header-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--sage);
            background: rgba(126,184,138,0.08);
            border: 1px solid rgba(126,184,138,0.15);
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
        }

        .status-badge .live-dot {
            width: 5px; height: 5px;
            background: var(--sage);
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .stat-chip {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.6rem 1rem;
            transition: all 0.25s ease;
        }

        .stat-chip:hover {
            border-color: var(--border-hover);
            background: var(--card-hover);
        }

        .stat-chip .stat-num {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--fg);
        }

        .stat-chip .stat-label {
            font-size: 0.7rem;
            color: var(--fg-muted);
            font-weight: 400;
        }

        .stat-chip .stat-icon {
            font-size: 0.75rem;
            color: var(--fg-dim);
        }

        /* === CARDS GRID === */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.25rem;
        }

        /* === CARD === */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            animation: cardIn 0.5s ease backwards;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Warna aksen strip atas tiap kartu */
        .card .accent-strip {
            height: 3px;
            width: 100%;
            flex-shrink: 0;
        }

        .card:nth-child(8n+1) .accent-strip { background: linear-gradient(90deg, var(--accent), rgba(232,168,56,0.2)); }
        .card:nth-child(8n+2) .accent-strip { background: linear-gradient(90deg, var(--coral), rgba(240,104,88,0.2)); }
        .card:nth-child(8n+3) .accent-strip { background: linear-gradient(90deg, var(--sage), rgba(126,184,138,0.2)); }
        .card:nth-child(8n+4) .accent-strip { background: linear-gradient(90deg, var(--sky), rgba(91,164,207,0.2)); }
        .card:nth-child(8n+5) .accent-strip { background: linear-gradient(90deg, var(--lavender), rgba(167,139,250,0.2)); }
        .card:nth-child(8n+6) .accent-strip { background: linear-gradient(90deg, var(--rose), rgba(244,114,182,0.2)); }
        .card:nth-child(8n+7) .accent-strip { background: linear-gradient(90deg, var(--teal), rgba(45,212,191,0.2)); }
        .card:nth-child(8n) .accent-strip { background: linear-gradient(90deg, var(--accent), var(--coral)); }

        .card:hover {
            border-color: var(--border-hover);
            background: var(--card-hover);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5);
        }

        .card-inner {
            padding: 1.25rem 1.4rem 1.4rem;
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 0.75rem;
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .card-index {
            font-family: var(--font-display);
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--fg-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            flex-shrink: 0;
            margin-top: 0.15rem;
        }

        .card-title {
            font-family: var(--font-display);
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--fg);
            letter-spacing: -0.01em;
            line-height: 1.35;
            flex: 1;
        }

        .card-content {
            font-size: 0.84rem;
            color: var(--fg-muted);
            line-height: 1.65;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }

        .card-meta {
            font-size: 0.65rem;
            color: var(--fg-dim);
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        /* === COPY BUTTON === */
        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.3rem 0.75rem;
            font-size: 0.68rem;
            font-weight: 500;
            font-family: var(--font-display);
            color: var(--fg-muted);
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.02em;
        }

        .copy-btn i { font-size: 0.65rem; }

        .copy-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--border-hover);
            color: var(--fg);
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .copy-btn.copied {
            background: rgba(126,184,138,0.1);
            border-color: rgba(126,184,138,0.25);
            color: var(--sage);
        }

        /* === EMPTY STATE === */
        .empty-state {
            grid-column: 1 / -1;
            background: var(--card);
            border: 1px dashed var(--border);
            border-radius: var(--radius-lg);
            padding: 4rem 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .empty-state .empty-icon {
            width: 56px; height: 56px;
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--fg-dim);
        }

        .empty-state .empty-title {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            color: var(--fg-muted);
        }

        .empty-state .empty-desc {
            font-size: 0.8rem;
            color: var(--fg-dim);
            max-width: 300px;
        }

        /* === LOADING === */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.25rem;
            padding: 5rem 2rem;
        }

        .loader-ring {
            width: 36px; height: 36px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-state span {
            font-size: 0.8rem;
            color: var(--fg-muted);
        }

        /* === ERROR === */
        .error-state {
            background: rgba(240,104,88,0.05);
            border: 1px solid rgba(240,104,88,0.15);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .error-state i {
            color: var(--coral);
            margin-top: 0.15rem;
            flex-shrink: 0;
        }

        .error-state .error-text {
            font-size: 0.82rem;
            color: rgba(240,180,170,0.9);
            line-height: 1.5;
        }

        .error-state .retry-btn {
            margin-top: 0.6rem;
            background: rgba(240,104,88,0.1);
            border: 1px solid rgba(240,104,88,0.2);
            color: var(--coral);
            font-size: 0.72rem;
            font-weight: 500;
            font-family: var(--font-display);
            padding: 0.35rem 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .error-state .retry-btn:hover {
            background: rgba(240,104,88,0.18);
        }

        /* === TOAST === */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.7rem 1.1rem;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--fg);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 12px 40px -10px rgba(0,0,0,0.6);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 1.2s forwards;
            pointer-events: none;
        }

        .toast .toast-icon {
            width: 22px; height: 22px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            flex-shrink: 0;
        }

        .toast.success .toast-icon {
            background: rgba(126,184,138,0.15);
            color: var(--sage);
        }

        .toast.error .toast-icon {
            background: rgba(240,104,88,0.15);
            color: var(--coral);
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(12px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(-8px) scale(0.95); }
        }

        /* === FOOTER === */
        .page-footer {
            margin-top: 3.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .page-footer span {
            font-size: 0.68rem;
            color: var(--fg-dim);
        }

        .page-footer .footer-links {
            display: flex;
            gap: 1rem;
        }

        .page-footer .footer-links a {
            font-size: 0.68rem;
            color: var(--fg-dim);
            text-decoration: none;
            transition: color 0.2s;
        }

        .page-footer .footer-links a:hover {
            color: var(--fg-muted);
        }

        /* === RESPONSIVE === */
        @media (max-width: 900px) {
            .app-layout { flex-direction: column; }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                flex-direction: row;
                padding: 0.75rem 1rem;
                gap: 0.5rem;
                border-right: none;
                border-bottom: 1px solid var(--border);
                overflow-x: auto;
            }

            .sidebar-brand { display: none; }
            .sidebar-footer { display: none; }

            .sidebar-item {
                flex-shrink: 0;
                padding: 0.55rem 0.75rem;
                gap: 0.5rem;
            }

            .sidebar-item .icon-wrap {
                width: 30px; height: 30px;
                border-radius: 8px;
                font-size: 0.7rem;
            }

            .sidebar-item .label { font-size: 0.75rem; }
            .sidebar-item .count { display: none; }

            .sidebar-item.active::before {
                left: 0;
                top: auto;
                bottom: -0.75rem;
                transform: none;
                width: 20px;
                height: 3px;
                border-radius: 4px 4px 0 0;
            }

            .main-content { padding: 1.5rem 1.25rem; }
            .page-title { font-size: 1.5rem; }
            .cards-grid { grid-template-columns: 1fr; }
            .stats-bar { gap: 0.5rem; }
            .stat-chip { padding: 0.5rem 0.75rem; }
            .stat-chip .stat-num { font-size: 0.95rem; }
        }

        @media (max-width: 480px) {
            .main-content { padding: 1rem; }
            .page-header { flex-direction: column; align-items: flex-start; }
        }

        /* prefers-reduced-motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<!-- Atmosfer latar belakang -->
<div class="bg-atmosphere" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<div class="app-layout">

    <!-- Sidebar Navigasi -->
    <aside class="sidebar" role="navigation" aria-label="Filter navigasi">
        <div class="sidebar-brand">
            <span class="dot"></span>
            Ruang Waktu
        </div>

        <div class="sidebar-item active" data-filter="all" role="button" tabindex="0" aria-label="Tampilkan semua data">
            <div class="icon-wrap"><i class="fa-solid fa-layer-group"></i></div>
            <span class="label">Semua Data</span>
            <span class="count" id="countAll">--</span>
        </div>

        <div class="sidebar-item" data-filter="jadwal" role="button" tabindex="0" aria-label="Filter jadwal pasaran">
            <div class="icon-wrap"><i class="fa-regular fa-calendar"></i></div>
            <span class="label">Jadwal Pasaran</span>
            <span class="count" id="countJadwal">--</span>
        </div>

        <div class="sidebar-footer">
            <div class="sidebar-footer-text">
                Data bersumber dari<br>Google Sheets (realtime)
            </div>
        </div>
    </aside>

    <!-- Konten Utama -->
    <main class="main-content">
        <div class="dashboard-container">

            <!-- Header Halaman -->
            <header class="page-header">
                <div class="page-header-left">
                    <h1 class="page-title">Ruang <span class="accent-word">Waktu</span></h1>
                    <p class="page-subtitle">Pusat informasi jadwal dan data terkini</p>
                </div>
                <div class="page-header-right">
                    <div class="status-badge">
                        <span class="live-dot"></span>
                        Live sync
                    </div>
                </div>
            </header>

            <!-- Statistik Ringkas -->
            <div class="stats-bar" id="statsBar">
                <div class="stat-chip">
                    <span class="stat-icon"><i class="fa-solid fa-database"></i></span>
                    <span class="stat-num" id="statTotal">--</span>
                    <span class="stat-label">Total Entri</span>
                </div>
                <div class="stat-chip">
                    <span class="stat-icon"><i class="fa-regular fa-calendar-check"></i></span>
                    <span class="stat-num" id="statJadwal">--</span>
                    <span class="stat-label">Jadwal Pasaran</span>
                </div>
                <div class="stat-chip">
                    <span class="stat-icon"><i class="fa-solid fa-filter"></i></span>
                    <span class="stat-num" id="statFiltered">--</span>
                    <span class="stat-label">Ditampilkan</span>
                </div>
            </div>

            <!-- Area Konten Dinamis -->
            <section id="contentArea" aria-live="polite">
                <div class="loading-state">
                    <div class="loader-ring"></div>
                    <span>Mengambil data dari Google Sheets...</span>
                </div>
            </section>

            <!-- Footer -->
            <footer class="page-footer">
                <span>Ruang Waktu &mdash; Data realtime dari Google Sheets</span>
                <div class="footer-links">
                    <a href="#" onclick="loadData(); return false;">Refresh</a>
                </div>
            </footer>

        </div>
    </main>
</div>

<script>
    /* =============================================
       KONFIGURASI & STATE
       ============================================= */
    const SPREADSHEET_ID = "1VO91WJb1w2Pi4V_GO12hDl8KPkkmHkOUFxtqEmCvygM";
    const DATA_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;

    let allData = [];
    let currentFilter = "all";
    let isLoading = false;
    let lastError = null;

    const contentArea = document.getElementById("contentArea");
    const countAllEl = document.getElementById("countAll");
    const countJadwalEl = document.getElementById("countJadwal");
    const statTotalEl = document.getElementById("statTotal");
    const statJadwalEl = document.getElementById("statJadwal");
    const statFilteredEl = document.getElementById("statFiltered");

    /* =============================================
       UTILITAS
       ============================================= */
    function escapeHtml(str) {
        if (!str) return "";
        return str
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function parseGvizResponse(text) {
        const start = text.indexOf("{");
        const end = text.lastIndexOf("}");
        if (start === -1 || end === -1) throw new Error("Format respons tidak valid");
        const parsed = JSON.parse(text.substring(start, end + 1));
        if (!parsed.table || !parsed.table.rows) throw new Error("Tidak ada data baris");
        return parsed.table;
    }

    function isJadwal(item) {
        return /jadwal|pasaran/i.test(item.title) || /jadwal|pasaran/i.test(item.content);
    }

    function getFilteredData() {
        if (currentFilter === "all") return allData;
        return allData.filter(isJadwal);
    }

    /* =============================================
       TOAST NOTIFIKASI
       ============================================= */
    function showToast(message, type) {
        const prev = document.querySelector(".toast");
        if (prev) prev.remove();

        const toast = document.createElement("div");
        toast.className = `toast ${type || "success"}`;
        const iconClass = type === "error"
            ? "fa-solid fa-xmark"
            : "fa-solid fa-check";
        toast.innerHTML = `
            <span class="toast-icon"><i class="${iconClass}"></i></span>
            <span>${escapeHtml(message)}</span>
        `;
        document.body.appendChild(toast);
        setTimeout(() => { if (toast.parentNode) toast.remove(); }, 1600);
    }

    /* =============================================
       SALIN KE CLIPBOARD
       ============================================= */
    async function copyToClipboard(text) {
        try {
            await navigator.clipboard.writeText(text);
            return true;
        } catch {
            /* Fallback untuk browser lama */
            try {
                const ta = document.createElement("textarea");
                ta.value = text;
                ta.style.position = "fixed";
                ta.style.opacity = "0";
                document.body.appendChild(ta);
                ta.select();
                document.execCommand("copy");
                document.body.removeChild(ta);
                return true;
            } catch {
                return false;
            }
        }
    }

    function handleCopyClick(e) {
        const btn = e.target.closest(".copy-btn");
        if (!btn || btn.classList.contains("copied")) return;

        const card = btn.closest(".card");
        if (!card) return;
        const contentEl = card.querySelector(".card-content");
        const text = contentEl ? contentEl.textContent : "";
        if (!text.trim()) {
            showToast("Tidak ada teks untuk disalin", "error");
            return;
        }

        copyToClipboard(text).then(ok => {
            if (ok) {
                btn.classList.add("copied");
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Tersalin';
                showToast("Isi berhasil disalin", "success");
                setTimeout(() => {
                    btn.classList.remove("copied");
                    btn.innerHTML = '<i class="fa-regular fa-copy"></i> Salin';
                }, 1800);
            } else {
                showToast("Gagal menyalin teks", "error");
            }
        });
    }

    /* =============================================
       RENDER UI
       ============================================= */
    function updateStats() {
        const total = allData.length;
        const jadwalCount = allData.filter(isJadwal).length;
        const filtered = getFilteredData().length;

        countAllEl.textContent = total;
        countJadwalEl.textContent = jadwalCount;
        statTotalEl.textContent = total;
        statJadwalEl.textContent = jadwalCount;
        statFilteredEl.textContent = filtered;
    }

    function renderContent() {
        if (!contentArea) return;

        /* Error state */
        if (lastError) {
            contentArea.innerHTML = `
                <div class="error-state">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <div>
                        <div class="error-text">${escapeHtml(lastError)}</div>
                        <button class="retry-btn" onclick="loadData()">Coba Lagi</button>
                    </div>
                </div>
            `;
            return;
        }

        /* Loading state */
        if (isLoading) {
            contentArea.innerHTML = `
                <div class="loading-state">
                    <div class="loader-ring"></div>
                    <span>Mengambil data dari Google Sheets...</span>
                </div>
            `;
            return;
        }

        const items = getFilteredData();
        updateStats();

        /* Empty state */
        if (items.length === 0) {
            contentArea.innerHTML = `
                <div class="cards-grid">
                    <div class="empty-state">
                        <div class="empty-icon"><i class="fa-regular fa-folder-open"></i></div>
                        <div class="empty-title">Tidak ada data ditemukan</div>
                        <div class="empty-desc">
                            ${currentFilter === "all"
                                ? "Belum ada entri di Google Sheets, atau sheet masih kosong."
                                : "Tidak ada data yang cocok dengan filter Jadwal Pasaran."}
                        </div>
                    </div>
                </div>
            `;
            return;
        }

        /* Render kartu */
        let html = '<div class="cards-grid">';
        for (let i = 0; i < items.length; i++) {
            const item = items[i];
            const title = escapeHtml(item.title) || "Tanpa Judul";
            const content = escapeHtml(item.content) || "Kosong";
            const delay = Math.min(i, 15) * 0.04;
            const index = String(i + 1).padStart(2, "0");

            html += `
                <article class="card" style="animation-delay:${delay}s">
                    <div class="accent-strip"></div>
                    <div class="card-inner">
                        <div class="card-top">
                            <div>
                                <div class="card-index">${index}</div>
                                <h2 class="card-title">${title}</h2>
                            </div>
                        </div>
                        <div class="card-content">${content}</div>
                        <div class="card-footer">
                            <div class="card-meta">
                                <i class="fa-regular fa-file-lines"></i>
                                ${content.length} karakter
                            </div>
                            <button class="copy-btn" aria-label="Salin isi kartu ${title}">
                                <i class="fa-regular fa-copy"></i> Salin
                            </button>
                        </div>
                    </div>
                </article>
            `;
        }
        html += "</div>";
        contentArea.innerHTML = html;
    }

    /* =============================================
       DATA FETCHING
       ============================================= */
    async function fetchSheetData() {
        const response = await fetch(DATA_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status} — Pastikan spreadsheet bersifat publik.`);
        const text = await response.text();
        const table = parseGvizResponse(text);
        const rows = table.rows || [];
        return rows.map(row => {
            const cells = row.c || [];
            return {
                title: cells[0] ? String(cells[0].v) : "",
                content: cells[1] ? String(cells[1].v) : ""
            };
        });
    }

    async function loadData() {
        isLoading = true;
        lastError = null;
        renderContent();

        try {
            allData = await fetchSheetData();
        } catch (err) {
            lastError = err.message || "Gagal memuat data. Periksa koneksi internet Anda.";
            allData = [];
        } finally {
            isLoading = false;
            renderContent();
        }
    }

    /* =============================================
       SIDEBAR INTERAKSI
       ============================================= */
    function initSidebar() {
        const items = document.querySelectorAll(".sidebar-item[data-filter]");

        function setActive(target) {
            items.forEach(el => el.classList.remove("active"));
            target.classList.add("active");
        }

        items.forEach(item => {
            function activate() {
                currentFilter = item.dataset.filter;
                setActive(item);
                renderContent();
            }

            item.addEventListener("click", activate);
            item.addEventListener("keydown", e => {
                if (e.key === "Enter" || e.key === " ") {
                    e.preventDefault();
                    activate();
                }
            });
        });
    }

    /* =============================================
       EVENT DELEGATION & INISIALISASI
       ============================================= */
    document.addEventListener("click", handleCopyClick);

    /* Mulai */
    loadData().then(() => initSidebar());
</script>

</body>
</html>
