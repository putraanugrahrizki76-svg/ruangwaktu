<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>RUANG WAKTU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg:#050508;--bg-el:#0b0b11;--card:rgba(255,255,255,0.02);--card-h:rgba(255,255,255,0.045);
  --bdr:rgba(255,255,255,0.055);--bdr-h:rgba(255,255,255,0.11);
  --fg:#e8e6e1;--fg-m:#6a6d7c;--fg-d:#2e3038;
  --accent:#daa032;--accent-g:rgba(218,160,50,0.1);
  --coral:#e05a48;--sage:#5fad70;--sky:#4e92be;--lav:#9078e0;--rose:#e068a0;--teal:#22c0a8;
  --content:#6ec0d4;--radius:14px;--radius-lg:18px;--sb-w:230px;
  --font-d:'Space Grotesk',system-ui,sans-serif;--font-b:'DM Sans',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);font-family:var(--font-b);color:var(--fg);line-height:1.6;overflow-x:hidden}

/* === Top Gradient Bar === */
.top-bar{position:fixed;top:0;left:0;right:0;height:2px;z-index:200;
  background:linear-gradient(90deg,var(--accent),var(--coral),var(--lav),var(--teal),var(--accent));
  background-size:300% 100%;animation:barShift 10s linear infinite}
@keyframes barShift{0%{background-position:0% 50%}100%{background-position:300% 50%}}

/* === Background === */
.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-layer .orb{position:absolute;border-radius:50%;filter:blur(130px);opacity:.35;animation:orbDrift 24s ease-in-out infinite alternate}
.orb-1{width:520px;height:520px;background:radial-gradient(circle,rgba(218,160,50,.16),transparent 70%);top:-8%;left:-4%;animation-duration:28s}
.orb-2{width:420px;height:420px;background:radial-gradient(circle,rgba(224,90,72,.1),transparent 70%);bottom:-12%;right:-4%;animation-duration:32s;animation-delay:-6s}
.orb-3{width:360px;height:360px;background:radial-gradient(circle,rgba(95,173,112,.08),transparent 70%);top:38%;left:48%;animation-duration:26s;animation-delay:-12s}
@keyframes orbDrift{0%{transform:translate(0,0) scale(1)}40%{transform:translate(35px,-45px) scale(1.06)}70%{transform:translate(-25px,25px) scale(.94)}100%{transform:translate(18px,-12px) scale(1.02)}}
.bg-grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:56px 56px;
  -webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 40%,black 20%,transparent 70%);
  mask-image:radial-gradient(ellipse 70% 60% at 50% 40%,black 20%,transparent 70%)}
.bg-noise{position:absolute;inset:0;opacity:.4;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  background-size:128px}

/* === Layout === */
.app{display:flex;min-height:100vh;position:relative;z-index:1;animation:appIn .7s ease}
@keyframes appIn{from{opacity:0}to{opacity:1}}

/* === Sidebar === */
.sb{width:var(--sb-w);background:rgba(11,11,17,.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-right:1px solid var(--bdr);display:flex;flex-direction:column;padding:2.2rem .9rem .9rem;gap:.35rem;
  position:sticky;top:0;height:100vh;flex-shrink:0}
.sb-brand{font-family:var(--font-d);font-size:.62rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
  color:var(--fg-m);padding:0 .85rem;margin-bottom:1.6rem;display:flex;align-items:center;gap:.55rem}
.sb-brand .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;box-shadow:0 0 10px rgba(218,160,50,.4);animation:dotPulse 2.5s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
.sb-item{display:flex;align-items:center;gap:.7rem;padding:.7rem .85rem;border-radius:11px;cursor:pointer;
  position:relative;border:1px solid transparent;overflow:hidden;transition:color .25s}
.sb-item::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.04);transform:translateX(-101%);transition:transform .3s ease;border-radius:inherit}
.sb-item:hover::after{transform:translateX(0)}
.sb-item .iw{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:.75rem;background:rgba(255,255,255,.035);color:var(--fg-d);transition:all .25s;flex-shrink:0;position:relative;z-index:1}
.sb-item .lb{font-family:var(--font-d);font-size:.78rem;font-weight:500;color:var(--fg-m);transition:color .25s;white-space:nowrap;position:relative;z-index:1}
.sb-item .ct{margin-left:auto;font-size:.6rem;font-weight:600;color:var(--fg-d);background:rgba(255,255,255,.035);
  padding:.12rem .45rem;border-radius:20px;transition:all .25s;min-width:22px;text-align:center;position:relative;z-index:1}
.sb-item:hover .lb{color:var(--fg)}
.sb-item:hover .iw{background:rgba(255,255,255,.06);color:var(--fg)}
.sb-item.active{border-color:rgba(218,160,50,.18);background:var(--accent-g)}
.sb-item.active::after{transform:translateX(0);background:rgba(218,160,50,.06)}
.sb-item.active .lb{color:var(--accent)}
.sb-item.active .iw{background:rgba(218,160,50,.14);color:var(--accent)}
.sb-item.active .ct{background:rgba(218,160,50,.12);color:var(--accent)}
.sb-item.active::before{content:'';position:absolute;left:-.9rem;top:50%;transform:translateY(-50%);width:2.5px;height:18px;
  background:var(--accent);border-radius:0 4px 4px 0}
.sb-foot{margin-top:auto;padding:.9rem .85rem 0;border-top:1px solid var(--bdr)}
.sb-foot span{font-size:.6rem;color:var(--fg-d);line-height:1.5;opacity:.7}

/* === Main === */
.mc{flex:1;padding:2.5rem 2.8rem;min-width:0}
.dc{max-width:1260px;margin:0 auto}

/* === Header === */
.ph{margin-bottom:2.2rem;display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.pt{font-family:var(--font-d);font-size:2.2rem;font-weight:700;color:var(--fg);letter-spacing:-.035em;line-height:1.15}
.pt .aw{background:linear-gradient(135deg,var(--accent),#f0c060);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ps{margin-top:.35rem;font-size:.82rem;color:var(--fg-m);font-weight:400}
.ph-r{display:flex;align-items:center;gap:.6rem}
.live{display:inline-flex;align-items:center;gap:.4rem;font-size:.65rem;font-weight:500;color:var(--sage);
  background:rgba(95,173,112,.06);border:1px solid rgba(95,173,112,.12);padding:.3rem .7rem;border-radius:20px}
.live .ld{width:5px;height:5px;background:var(--sage);border-radius:50%;position:relative}
.live .ld::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid var(--sage);animation:liveRing 2s ease-out infinite}
@keyframes liveRing{0%{transform:scale(.7);opacity:.7}100%{transform:scale(2.2);opacity:0}}

/* === Search === */
.search{position:relative;margin-bottom:1.4rem}
.search .si{position:absolute;left:1rem;top:50%;transform:translateY(-50%);font-size:.82rem;color:var(--fg-d);pointer-events:none;transition:color .25s}
.search input{width:100%;padding:.75rem 3rem .75rem 2.75rem;font-family:var(--font-b);font-size:.85rem;color:var(--fg);
  background:rgba(255,255,255,.02);border:1px solid var(--bdr);border-radius:12px;outline:none;transition:all .3s ease}
.search input::placeholder{color:var(--fg-d);font-size:.82rem}
.search input:focus{border-color:rgba(218,160,50,.3);background:rgba(255,255,255,.035);
  box-shadow:0 0 0 3px rgba(218,160,50,.05),0 8px 28px -8px rgba(0,0,0,.35)}
.search input:focus~.si{color:var(--accent)}
.search .sc{position:absolute;right:.7rem;top:50%;transform:translateY(-50%);width:26px;height:26px;border-radius:7px;
  background:transparent;border:1px solid transparent;color:var(--fg-d);font-size:.65rem;cursor:pointer;
  display:none;align-items:center;justify-content:center;transition:all .2s}
.search .sc.vis{display:flex}
.search .sc:hover{background:rgba(255,255,255,.05);border-color:var(--bdr);color:var(--fg-m)}
.search .sc:active{transform:translateY(-50%) scale(.9)}
.search .sh{position:absolute;right:.7rem;top:50%;transform:translateY(-50%);font-size:.58rem;font-family:var(--font-d);
  font-weight:500;color:var(--fg-d);background:rgba(255,255,255,.025);border:1px solid var(--bdr);
  padding:.18rem .45rem;border-radius:5px;pointer-events:none;transition:opacity .2s}
.search .sh.hid{opacity:0}
.search .src{margin-top:.45rem;font-size:.66rem;font-family:var(--font-d);font-weight:500;color:var(--fg-d);padding-left:.1rem;min-height:.9rem}
.search .src b{color:var(--accent);font-weight:600}

/* === Toolbar === */
.tb{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.3rem;gap:1rem;flex-wrap:wrap}
.tb-l{font-family:var(--font-d);font-size:.72rem;color:var(--fg-m);display:flex;align-items:center;gap:.45rem}
.vt{display:flex;background:rgba(255,255,255,.025);border:1px solid var(--bdr);border-radius:10px;padding:3px;gap:2px}
.vt-b{padding:.38rem .75rem;font-size:.68rem;font-family:var(--font-d);font-weight:500;color:var(--fg-d);background:transparent;
  border:none;cursor:pointer;border-radius:7px;transition:all .2s;display:flex;align-items:center;gap:.3rem}
.vt-b:hover{color:var(--fg-m)}
.vt-b.on{background:rgba(255,255,255,.07);color:var(--fg);box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* === Content Area === */
#contentArea{transition:opacity .18s ease,transform .18s ease}

/* === Grid Cards === */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:1.1rem}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--radius-lg);overflow:hidden;
  display:flex;flex-direction:column;position:relative;cursor:pointer;
  transition:all .35s cubic-bezier(.22,.68,.36,1);animation:cIn .45s ease backwards}
.card::before{content:'';position:absolute;inset:0;border-radius:inherit;
  background:radial-gradient(420px circle at var(--mx,50%) var(--my,50%),rgba(218,160,50,.07),transparent 50%);
  opacity:0;transition:opacity .35s;z-index:0;pointer-events:none}
.card:hover::before{opacity:1}
@keyframes cIn{from{opacity:0;transform:translateY(16px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
.card .strip{height:2px;width:100%;flex-shrink:0}
.card:nth-child(8n+1) .strip{background:linear-gradient(90deg,var(--accent),rgba(218,160,50,.15))}
.card:nth-child(8n+2) .strip{background:linear-gradient(90deg,var(--coral),rgba(224,90,72,.15))}
.card:nth-child(8n+3) .strip{background:linear-gradient(90deg,var(--sage),rgba(95,173,112,.15))}
.card:nth-child(8n+4) .strip{background:linear-gradient(90deg,var(--sky),rgba(78,146,190,.15))}
.card:nth-child(8n+5) .strip{background:linear-gradient(90deg,var(--lav),rgba(144,120,224,.15))}
.card:nth-child(8n+6) .strip{background:linear-gradient(90deg,var(--rose),rgba(224,104,160,.15))}
.card:nth-child(8n+7) .strip{background:linear-gradient(90deg,var(--teal),rgba(34,192,168,.15))}
.card:nth-child(8n) .strip{background:linear-gradient(90deg,var(--accent),var(--coral))}
.card:hover{border-color:var(--bdr-h);background:var(--card-h);transform:translateY(-3px);
  box-shadow:0 16px 40px -12px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.03)}
.ci{padding:1.15rem 1.3rem 1.3rem;display:flex;flex-direction:column;flex:1;gap:.65rem;position:relative;z-index:1}
.ct2{display:flex;align-items:flex-start;justify-content:space-between;gap:.7rem}
.c-idx{font-family:var(--font-d);font-size:.56rem;font-weight:600;color:var(--fg-d);letter-spacing:.12em;text-transform:uppercase;margin-top:.1rem}
.c-ttl{font-family:var(--font-d);font-size:1rem;font-weight:600;color:var(--fg);letter-spacing:-.01em;line-height:1.35;flex:1}
.c-ttl mark{background:rgba(218,160,50,.18);color:var(--accent);border-radius:2px;padding:0 2px}
.c-body{font-size:.82rem;color:var(--content);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
.c-body mark{background:rgba(110,192,212,.14);color:var(--content);border-radius:2px;padding:0 2px}
.c-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:.65rem;border-top:1px solid var(--bdr)}
.c-meta{font-size:.6rem;color:var(--fg-d);display:flex;align-items:center;gap:.3rem}
.c-hint{font-size:.58rem;color:var(--fg-d);display:flex;align-items:center;gap:.25rem;opacity:0;transition:opacity .25s}
.card:hover .c-hint{opacity:.7}

/* === Copy Button === */
.cpbtn{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .55rem;font-size:.6rem;font-weight:500;
  font-family:var(--font-d);color:var(--fg-d);background:transparent;border:1px solid transparent;
  border-radius:6px;cursor:pointer;transition:all .2s;flex-shrink:0}
.cpbtn:hover{background:rgba(255,255,255,.04);border-color:var(--bdr);color:var(--fg-m)}
.cpbtn:active{transform:scale(.92)}
.cpbtn.ok{color:var(--sage);border-color:rgba(95,173,112,.18);background:rgba(95,173,112,.05)}

/* === List View === */
.cl{display:flex;flex-direction:column;gap:.5rem}
.lr{display:grid;grid-template-columns:44px 1fr 2fr auto;align-items:start;gap:.9rem;
  background:var(--card);border:1px solid var(--bdr);border-radius:var(--radius);padding:.9rem 1.1rem;
  cursor:pointer;transition:all .25s ease;animation:rIn .3s ease backwards}
@keyframes rIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.lr:hover{background:var(--card-h);border-color:var(--bdr-h)}
.lr .ri{font-family:var(--font-d);font-size:.58rem;font-weight:600;color:var(--fg-d);letter-spacing:.1em;padding-top:.15rem}
.lr .rt{font-family:var(--font-d);font-size:.85rem;font-weight:600;color:var(--fg);line-height:1.35}
.lr .rt mark{background:rgba(218,160,50,.18);color:var(--accent);border-radius:2px;padding:0 2px}
.lr .rc{font-size:.78rem;color:var(--content);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.lr .rc mark{background:rgba(110,192,212,.14);color:var(--content);border-radius:2px;padding:0 2px}
.lr .ra{display:flex;align-items:center;gap:.35rem;padding-top:.1rem}
.lr .rab{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.025);border:1px solid var(--bdr);
  color:var(--fg-d);font-size:.65rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.lr .rab:hover{background:rgba(255,255,255,.05);border-color:var(--bdr-h);color:var(--fg-m)}

/* === Empty State === */
.empty{grid-column:1/-1;background:var(--card);border:1px dashed rgba(255,255,255,.06);border-radius:var(--radius-lg);
  padding:3.5rem 2rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:.9rem}
.empty .ei{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.025);border:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--fg-d)}
.empty .et{font-family:var(--font-d);font-size:.95rem;font-weight:600;color:var(--fg-m)}
.empty .ed{font-size:.75rem;color:var(--fg-d);max-width:280px;line-height:1.5}

/* === Loading / Error === */
.ldg{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.1rem;padding:4.5rem 2rem}
.ldg .ring{width:32px;height:32px;border:2px solid var(--bdr);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ldg span{font-size:.75rem;color:var(--fg-m)}
.err{background:rgba(224,90,72,.04);border:1px solid rgba(224,90,72,.12);border-radius:var(--radius);padding:1.1rem 1.3rem;
  display:flex;align-items:flex-start;gap:.7rem}
.err i{color:var(--coral);margin-top:.1rem;flex-shrink:0}
.err .etxt{font-size:.78rem;color:rgba(224,160,150,.85);line-height:1.5}
.err .rbtn{margin-top:.5rem;background:rgba(224,90,72,.08);border:1px solid rgba(224,90,72,.16);color:var(--coral);
  font-size:.68rem;font-weight:500;font-family:var(--font-d);padding:.3rem .75rem;border-radius:7px;cursor:pointer;transition:all .2s}
.err .rbtn:hover{background:rgba(224,90,72,.15)}

/* === Modal === */
.mo{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.65);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s}
.mo.open{opacity:1;visibility:visible}
.mp{background:rgba(11,11,17,.92);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border:1px solid var(--bdr);border-radius:var(--radius-lg);width:100%;max-width:660px;max-height:85vh;
  display:flex;flex-direction:column;transform:translateY(14px) scale(.97);
  transition:transform .35s cubic-bezier(.18,.9,.32,1);box-shadow:0 32px 72px -20px rgba(0,0,0,.7);overflow:hidden}
.mo.open .mp{transform:translateY(0) scale(1)}
.mp .mbar{height:3px;width:100%;flex-shrink:0;background:linear-gradient(90deg,var(--accent),var(--coral),var(--lav),var(--teal));background-size:300% 100%;animation:barShift 10s linear infinite}
.mh{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1.1rem 1.5rem;border-bottom:1px solid var(--bdr)}
.mh-info{display:flex;flex-direction:column;gap:.15rem;min-width:0}
.mh-idx{font-family:var(--font-d);font-size:.58rem;font-weight:600;color:var(--fg-d);letter-spacing:.12em}
.mh-ttl{font-family:var(--font-d);font-size:1.1rem;font-weight:600;color:var(--fg);letter-spacing:-.01em;line-height:1.3;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mcl{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid var(--bdr);
  color:var(--fg-m);font-size:.8rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.mcl:hover{background:rgba(255,255,255,.08);border-color:var(--bdr-h);color:var(--fg)}
.mb{padding:1.3rem 1.5rem 1.5rem;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:1.1rem}
.ms{display:flex;flex-direction:column;gap:.4rem}
.ms-l{font-family:var(--font-d);font-size:.6rem;font-weight:600;color:var(--fg-d);letter-spacing:.12em;text-transform:uppercase}
.ms-v{font-size:.88rem;color:var(--fg);line-height:1.75;word-break:break-word;white-space:pre-wrap;
  background:rgba(255,255,255,.018);border:1px solid var(--bdr);border-radius:11px;padding:.9rem 1.05rem}
.ms-v.emp{color:var(--fg-d);font-style:italic}
.ms-v.mct{color:var(--content)}
.m-acts{display:flex;gap:.5rem;padding-top:.5rem;border-top:1px solid var(--bdr);margin-top:auto}
.m-cp{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1rem;font-size:.72rem;font-weight:500;
  font-family:var(--font-d);color:var(--fg-m);background:rgba(255,255,255,.03);border:1px solid var(--bdr);
  border-radius:9px;cursor:pointer;transition:all .2s}
.m-cp:hover{background:rgba(255,255,255,.06);border-color:var(--bdr-h);color:var(--fg)}
.m-cp:active{transform:scale(.96)}
.m-cp.ok{color:var(--sage);border-color:rgba(95,173,112,.2);background:rgba(95,173,112,.06)}

/* === Toast === */
.toast{position:fixed;bottom:1.3rem;right:1.3rem;background:rgba(11,11,17,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--bdr);border-radius:11px;padding:.6rem 1rem;font-size:.74rem;font-weight:500;color:var(--fg);
  z-index:9999;display:flex;align-items:center;gap:.45rem;box-shadow:0 12px 36px -10px rgba(0,0,0,.6);
  animation:tIn .28s ease,tOut .28s ease 1.3s forwards;pointer-events:none}
.toast .ti{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.55rem;flex-shrink:0}
.toast.ok .ti{background:rgba(95,173,112,.12);color:var(--sage)}
.toast.no .ti{background:rgba(224,90,72,.12);color:var(--coral)}
@keyframes tIn{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes tOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-6px) scale(.95)}}

/* === Footer === */
.pf{margin-top:3rem;padding-top:1.2rem;border-top:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.pf span{font-size:.62rem;color:var(--fg-d)}

/* === Scrollbar === */
.mb::-webkit-scrollbar{width:3px}
.mb::-webkit-scrollbar-track{background:transparent}
.mb::-webkit-scrollbar-thumb{background:var(--fg-d);border-radius:3px}

/* === Responsive === */
@media(max-width:900px){
  .app{flex-direction:column}
  .sb{width:100%;height:auto;position:relative;flex-direction:row;padding:.65rem .8rem;gap:.4rem;
    border-right:none;border-bottom:1px solid var(--bdr);overflow-x:auto;-webkit-overflow-scrolling:touch}
  .sb-brand,.sb-foot{display:none}
  .sb-item{flex-shrink:0;padding:.5rem .65rem;gap:.45rem}
  .sb-item .iw{width:28px;height:28px;border-radius:7px;font-size:.65rem}
  .sb-item .lb{font-size:.7rem}
  .sb-item .ct{display:none}
  .sb-item.active::before{left:0;top:auto;bottom:-.65rem;transform:none;width:18px;height:2.5px;border-radius:4px 4px 0 0}
  .mc{padding:1.4rem 1.1rem}
  .pt{font-size:1.6rem}
  .cg{grid-template-columns:1fr}
  .lr{grid-template-columns:34px 1fr auto}
  .lr .rc{display:none}
}
@media(max-width:480px){
  .mc{padding:.9rem}
  .ph{flex-direction:column;align-items:flex-start}
  .mp{max-height:92vh;border-radius:14px}
  .mh{padding:.85rem 1.1rem}
  .mb{padding:1rem 1.1rem 1.1rem}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>

<div class="top-bar" aria-hidden="true"></div>

<div class="bg-layer" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="bg-grid"></div>
  <div class="bg-noise"></div>
</div>

<div class="app">
  <aside class="sb" role="navigation" aria-label="Filter navigasi">
    <div class="sb-brand"><span class="dot"></span>Ruang Waktu</div>
    <div class="sb-item active" data-filter="all" role="button" tabindex="0">
      <div class="iw"><i class="fa-solid fa-layer-group"></i></div>
      <span class="lb">All PK</span>
      <span class="ct" id="countAll">--</span>
    </div>
    <div class="sb-item" data-filter="jadwal" role="button" tabindex="0">
      <div class="iw"><i class="fa-regular fa-calendar"></i></div>
      <span class="lb">Jadwal Pasaran</span>
      <span class="ct" id="countJadwal">--</span>
    </div>
    <div class="sb-foot"><span>Data bersumber dari<br>Google Sheets (realtime)</span></div>
  </aside>

  <main class="mc">
    <div class="dc">
      <header class="ph">
        <div>
          <h1 class="pt">Ruang <span class="aw">Waktu</span></h1>
          <p class="ps">Pusat informasi jadwal dan data terkini</p>
        </div>
        <div class="ph-r">
          <div class="live"><span class="ld"></span>Live sync</div>
        </div>
      </header>

      <div class="search">
        <i class="fa-solid fa-magnifying-glass si"></i>
        <input type="text" id="searchInput" placeholder="Cari judul atau isi data..." autocomplete="off" spellcheck="false">
        <span class="sh" id="searchHint">Ctrl+K</span>
        <button class="sc" id="searchClear" aria-label="Hapus pencarian"><i class="fa-solid fa-xmark"></i></button>
        <div class="src" id="searchResultCount"></div>
      </div>

      <div class="tb">
        <div class="tb-l"><i class="fa-solid fa-eye"></i><span id="viewLabel">Tampilan Grid</span></div>
        <div class="vt">
          <button class="vt-b on" data-view="grid" aria-label="Grid"><i class="fa-solid fa-grip"></i> Grid</button>
          <button class="vt-b" data-view="list" aria-label="List"><i class="fa-solid fa-list"></i> List</button>
        </div>
      </div>

      <section id="contentArea" aria-live="polite">
        <div class="ldg"><div class="ring"></div><span>Mengambil data dari Google Sheets...</span></div>
      </section>

      <footer class="pf">
        <span>Ruang Waktu &mdash; Klik kartu untuk lihat isi lengkap</span>
      </footer>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="mo" id="modalOverlay" role="dialog" aria-modal="true" aria-label="Detail entri">
  <div class="mp">
    <div class="mbar"></div>
    <div class="mh">
      <div class="mh-info">
        <div class="mh-idx" id="modalIdx"></div>
        <div class="mh-ttl" id="modalTitle"></div>
      </div>
      <button class="mcl" id="modalCloseBtn" aria-label="Tutup"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="mb">
      <div class="ms">
        <div class="ms-l">Judul</div>
        <div class="ms-v" id="modalColA"></div>
      </div>
      <div class="ms">
        <div class="ms-l">Isi Konten</div>
        <div class="ms-v mct" id="modalColB"></div>
      </div>
      <div class="m-acts">
        <button class="m-cp" id="modalCopyBtn"><i class="fa-regular fa-copy"></i> Salin Isi</button>
      </div>
    </div>
  </div>
</div>

<script>
const SID="1VO91WJb1w2Pi4V_GO12hDl8KPkkmHkOUFxtqEmCvygM";
const URL=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json`;

let allData=[],curFilter="all",curView="grid",sQuery="",loading=false,lastErr=null,modalIdx=-1,firstRender=true;

const $=id=>document.getElementById(id);
const area=$("contentArea"),cAll=$("countAll"),cJad=$("countJadwal"),vLbl=$("viewLabel");
const sIn=$("searchInput"),sClr=$("searchClear"),sHnt=$("searchHint"),sRC=$("searchResultCount");
const mOv=$("modalOverlay"),mCl=$("modalCloseBtn"),mCA=$("modalColA"),mCB=$("modalColB"),mTi=$("modalTitle"),mIx=$("modalIdx"),mCp=$("modalCopyBtn");

function esc(s){return s?s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"):""}
function hl(t,q){if(!t||!q)return esc(t);const e=esc(t),eq=esc(q).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");return e.replace(new RegExp(`(${eq})`,"gi"),"<mark>$1</mark>")}
function parseGviz(t){const s=t.indexOf("{"),e=t.lastIndexOf("}");if(s<0||e<0)throw new Error("Format respons tidak valid");const p=JSON.parse(t.substring(s,e+1));if(!p.table||!p.table.rows)throw new Error("Tidak ada data baris");return p.table}
function isJad(i){return /jadwal|pasaran/i.test(i.title)||/jadwal|pasaran/i.test(i.content)}
function filtered(){let d=curFilter==="all"?allData:allData.filter(isJad);if(sQuery.trim()){const q=sQuery.trim().toLowerCase();d=d.filter(i=>(i.title&&i.title.toLowerCase().includes(q))||(i.content&&i.content.toLowerCase().includes(q)))}return d}

function toast(msg,ok){document.querySelectorAll(".toast").forEach(t=>t.remove());const t=document.createElement("div");t.className=`toast ${ok?"ok":"no"}`;t.innerHTML=`<span class="ti"><i class="fa-solid fa-${ok?"check":"xmark"}"></i></span><span>${esc(msg)}</span>`;document.body.appendChild(t);setTimeout(()=>{if(t.parentNode)t.remove()},1700)}

async function copyText(text,btn){
  if(!text){toast("Tidak ada isi untuk disalin",false);return}
  try{await navigator.clipboard.writeText(text)}catch{try{const ta=document.createElement("textarea");ta.value=text;ta.style.cssText="position:fixed;opacity:0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta)}catch{toast("Gagal menyalin",false);return}}
  btn.classList.add("ok");btn.innerHTML='<i class="fa-solid fa-check"></i>'+btn.textContent.trim();toast("Berhasil disalin",true);
  setTimeout(()=>{btn.classList.remove("ok");btn.innerHTML='<i class="fa-regular fa-copy"></i> '+btn.textContent.replace(/Salin Isi|Berhasil disalin/g,"").trim()||"Salin Isi"},1800);
}

function openModal(i){const items=filtered();if(i<0||i>=items.length)return;modalIdx=i;const it=items[i];
  mIx.textContent="#"+String(i+1).padStart(2,"0");mTi.textContent=it.title||"(Tanpa Judul)";
  mCA.textContent=it.title||"(Kosong)";mCA.classList.toggle("emp",!it.title);
  mCB.textContent=it.content||"(Kosong)";mCB.classList.toggle("emp",!it.content);
  mCp.classList.remove("ok");mCp.innerHTML='<i class="fa-regular fa-copy"></i> Salin Isi';
  mOv.classList.add("open");document.body.style.overflow="hidden"}
function closeModal(){mOv.classList.remove("open");document.body.style.overflow="";modalIdx=-1}

mCl.addEventListener("click",closeModal);
mOv.addEventListener("click",e=>{if(e.target===mOv)closeModal()});
mCp.addEventListener("click",()=>{const items=filtered();const it=items[modalIdx];if(it)copyText(it.content,mCp)});
document.addEventListener("keydown",e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();sIn.focus();return}
  if(!mOv.classList.contains("open"))return;if(e.key==="Escape")closeModal()
});

function updSearch(){const has=sIn.value.length>0;sClr.classList.toggle("vis",has);sHnt.classList.toggle("hid",has||document.activeElement===sIn);
  const items=filtered(),total=curFilter==="all"?allData.length:allData.filter(isJad).length;
  sRC.innerHTML=has?`Ditemukan <b>${items.length}</b> dari ${total} data`:""}
sIn.addEventListener("input",()=>{sQuery=sIn.value;updSearch();render()});
sIn.addEventListener("focus",()=>sHnt.classList.add("hid"));
sIn.addEventListener("blur",()=>{if(!sIn.value)sHnt.classList.remove("hid")});
sClr.addEventListener("click",()=>{sIn.value="";sQuery="";sIn.focus();updSearch();render()});

function updCounts(){cAll.textContent=allData.length;cJad.textContent=allData.filter(isJad).length}

function render(){if(lastErr){area.style.opacity="1";area.style.transform="none";area.innerHTML=`<div class="err"><i class="fa-solid fa-triangle-exclamation"></i><div><div class="etxt">${esc(lastErr)}</div><button class="rbtn" onclick="loadData()">Coba Lagi</button></div></div>`;return}
  if(loading){area.style.opacity="1";area.style.transform="none";area.innerHTML=`<div class="ldg"><div class="ring"></div><span>Mengambil data dari Google Sheets...</span></div>`;return}
  updCounts();updSearch();const items=filtered();
  if(items.length===0){const sq=sQuery.trim(),em=sq?`Tidak ditemukan data untuk "<strong>${esc(sq)}</strong>"`:(curFilter==="all"?"Belum ada entri di Google Sheets.":"Tidak ada data Jadwal Pasaran.");
    area.style.opacity="1";area.style.transform="none";area.innerHTML=`<div class="cg"><div class="empty"><div class="ei"><i class="fa-solid fa-${sq?"magnifying-glass":"folder-open"}"></i></div><div class="et">${sq?"Tidak ada hasil":"Tidak ada data"}</div><div class="ed">${em}${sq?"<br>Coba kata kunci lain.":""}</div></div></div>`;return}
  if(firstRender){firstRender=false;curView==="grid"?renderGrid(items):renderList(items);return}
  area.style.opacity="0";area.style.transform="translateY(5px)";
  setTimeout(()=>{curView==="grid"?renderGrid(items):renderList(items);area.style.opacity="1";area.style.transform="translateY(0)"},170)}

function renderGrid(items){const q=sQuery.trim();let h='<div class="cg">';
  for(let i=0;i<items.length;i++){const it=items[i],t=q?hl(it.title,q):(esc(it.title)||"Tanpa Judul"),c=q?hl(it.content,q):(esc(it.content)||"Kosong"),
    d=Math.min(i,18)*.035,idx=String(i+1).padStart(2,"0");
    h+=`<article class="card" data-index="${i}" style="animation-delay:${d}s"><div class="strip"></div><div class="ci"><div class="ct2"><div><div class="c-idx">${idx}</div><h2 class="c-ttl">${t}</h2></div><button class="cpbtn" title="Salin isi" aria-label="Salin isi"><i class="fa-regular fa-copy"></i></button></div><div class="c-body">${c}</div><div class="c-foot"><div class="c-meta"><i class="fa-regular fa-file-lines"></i>${it.content?it.content.length:0} karakter</div><div class="c-hint"><i class="fa-solid fa-arrow-up-right-from-square"></i>Detail</div></div></div></article>`}
  h+="</div>";area.innerHTML=h}

function renderList(items){const q=sQuery.trim();let h='<div class="cl">';
  for(let i=0;i<items.length;i++){const it=items[i],t=q?hl(it.title,q):(esc(it.title)||"Tanpa Judul"),c=q?hl(it.content,q):(esc(it.content)||"Kosong"),
    d=Math.min(i,18)*.025,idx=String(i+1).padStart(2,"0");
    h+=`<div class="lr" data-index="${i}" style="animation-delay:${d}s"><div class="ri">${idx}</div><div class="rt">${t}</div><div class="rc">${c}</div><div class="ra"><button class="rab cpbtn" title="Salin" aria-label="Salin"><i class="fa-regular fa-copy"></i></button><button class="rab" title="Detail" aria-label="Detail"><i class="fa-solid fa-expand"></i></button></div></div>`}
  h+="</div>";area.innerHTML=h}

/* Mouse-tracking glow pada kartu */
area.addEventListener("mousemove",e=>{const card=e.target.closest(".card");if(card){const r=card.getBoundingClientRect();card.style.setProperty("--mx",`${e.clientX-r.left}px`);card.style.setProperty("--my",`${e.clientY-r.top}px`)}});

/* Delegasi klik */
area.addEventListener("click",e=>{
  if(e.target.closest(".cpbtn")){const p=e.target.closest(".card")||e.target.closest(".lr");if(p){const idx=parseInt(p.dataset.index,10);const it=filtered()[idx];if(it)copyText(it.content,e.target.closest(".cpbtn"))}return}
  const card=e.target.closest(".card");if(card){openModal(parseInt(card.dataset.index,10));return}
  const row=e.target.closest(".lr");if(row)openModal(parseInt(row.dataset.index,10))});

/* View toggle */
document.querySelectorAll(".vt-b").forEach(b=>b.addEventListener("click",()=>{document.querySelectorAll(".vt-b").forEach(x=>x.classList.remove("on"));b.classList.add("on");curView=b.dataset.view;vLbl.textContent=curView==="grid"?"Tampilan Grid":"Tampilan List";render()}));

/* Sidebar filter */
document.querySelectorAll(".sb-item[data-filter]").forEach(el=>{const act=()=>{document.querySelectorAll(".sb-item[data-filter]").forEach(x=>x.classList.remove("active"));el.classList.add("active");curFilter=el.dataset.filter;render()};
  el.addEventListener("click",act);el.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();act()}})});

/* Fetch data */
async function loadData(){loading=true;lastErr=null;render();try{const r=await fetch(URL);if(!r.ok)throw new Error(`HTTP ${r.status} — Pastikan spreadsheet bersifat publik.`);const t=await r.text();const tbl=parseGviz(t);allData=(tbl.rows||[]).map(r=>{const c=r.c||[];return{title:c[0]?String(c[0].v):"",content:c[1]?String(c[1].v):""}})}catch(e){lastErr=e.message||"Gagal memuat data.";allData=[]}finally{loading=false;render()}}
loadData();
</script>
</body>
</html>
