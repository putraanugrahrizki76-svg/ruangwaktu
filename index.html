<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>RUANG WAKTU · Data Center · QRIS & Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600,1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
--bg:#08080c;--bg-elevated:#111118;--card:rgba(255,255,255,0.03);--card-hover:rgba(255,255,255,0.06);
--border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.12);
--fg:#e8e6e3;--fg-muted:#6e7181;--fg-dim:#3d3f4a;
--accent:#e8a838;--accent-soft:rgba(232,168,56,0.08);
--coral:#f06858;--sage:#7eb88a;--lavender:#a78bfa;
--content-color:#7dd3e8;
--qris-primary:#4fc3f7;--qris-soft:rgba(79,195,247,0.06);
--radius:16px;--radius-lg:22px;--sidebar-w:260px;
--font-display:'Space Grotesk',system-ui,sans-serif;--font-body:'DM Sans',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{min-height:100vh;background:var(--bg);font-family:var(--font-body);color:var(--fg);line-height:1.6;overflow-x:hidden;}

/* ========= TOAST ========= */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg-elevated);border:1px solid var(--border);border-radius:12px;padding:0.7rem 1.3rem;font-size:0.82rem;color:var(--fg);display:flex;align-items:center;gap:0.55rem;box-shadow:0 12px 40px -10px rgba(0,0,0,0.6);z-index:20000;opacity:0;animation:toastIn 0.35s ease forwards,toastOut 0.35s ease 1.2s forwards;pointer-events:none;white-space:nowrap;}
@keyframes toastIn{to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(10px);}}

/* ========= CYBERPUNK LOGIN OVERLAY ========= */
.login-overlay {
    position: fixed; inset: 0; z-index: 10000;
    background: linear-gradient(135deg, rgba(8,8,12,0.95), rgba(12,6,22,0.97));
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s ease;
    opacity: 1; visibility: visible;
}
.login-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.login-overlay .scanlines { position: absolute; inset: 0; pointer-events: none; z-index: 1; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,240,255,0.015) 2px, rgba(0,240,255,0.015) 4px); }
.login-overlay .grid-bg { position: absolute; inset: 0; pointer-events: none; z-index: 0; background-image: linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px); background-size: 60px 60px; animation: gridShift 20s linear infinite; }
@keyframes gridShift { 0%{background-position:0 0;} 100%{background-position:60px 60px;} }
.login-overlay .corner{position:fixed;width:50px;height:50px;pointer-events:none;z-index:2;}
.login-overlay .corner-tl{top:16px;left:16px;border-top:2px solid #00f0ff;border-left:2px solid #00f0ff;box-shadow:0 0 15px rgba(0,240,255,0.3),inset 0 0 15px rgba(0,240,255,0.05);}
.login-overlay .corner-tr{top:16px;right:16px;border-top:2px solid #ff00e5;border-right:2px solid #ff00e5;box-shadow:0 0 15px rgba(255,0,229,0.3),inset 0 0 15px rgba(255,0,229,0.05);}
.login-overlay .corner-bl{bottom:16px;left:16px;border-bottom:2px solid #39ff14;border-left:2px solid #39ff14;box-shadow:0 0 15px rgba(57,255,20,0.3),inset 0 0 15px rgba(57,255,20,0.05);}
.login-overlay .corner-br{bottom:16px;right:16px;border-bottom:2px solid #00f0ff;border-right:2px solid #00f0ff;box-shadow:0 0 15px rgba(0,240,255,0.3),inset 0 0 15px rgba(0,240,255,0.05);}
.login-overlay .side-label{position:fixed;font-family:var(--font-display);font-size:0.55rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(0,240,255,0.2);writing-mode:vertical-rl;pointer-events:none;z-index:2;}
.login-overlay .side-label-left{left:20px;top:50%;transform:translateY(-50%);}
.login-overlay .side-label-right{right:20px;top:50%;transform:translateY(-50%) rotate(180deg);}
.login-card {
    width: 90%; max-width: 420px;
    background: linear-gradient(160deg, rgba(14,14,24,0.97), rgba(6,6,12,0.99));
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-radius: 28px; padding: 3rem 2.5rem 2.5rem;
    position: relative; z-index: 5;
    box-shadow: 0 0 0 1px rgba(0,240,255,0.1), 0 0 60px -10px rgba(0,240,255,0.12), 0 60px 120px -30px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.04);
    animation: cardFloat 6s ease-in-out infinite;
    overflow: hidden;
}
.login-card .card-inner-glow { position: absolute; inset: 0; pointer-events: none; background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,240,255,0.04) 0%, transparent 70%); }
@keyframes cardFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
.login-card::before { content:''; position:absolute; top:0; left:24px; right:24px; height:2px; background:linear-gradient(90deg,transparent,#00f0ff,#ff00e5,#39ff14,transparent); border-radius:2px; box-shadow:0 0 25px rgba(0,240,255,0.5),0 0 50px rgba(255,0,229,0.2); animation:topLineShimmer 3s ease-in-out infinite alternate; }
@keyframes topLineShimmer{0%{opacity:0.7;}100%{opacity:1;}}
.login-card::after { content:''; position:absolute; bottom:0; left:24px; right:24px; height:2px; background:linear-gradient(90deg,transparent,#39ff14,#00f0ff,#ff00e5,transparent); border-radius:2px; box-shadow:0 0 25px rgba(57,255,20,0.4); }
.login-icon { text-align:center; margin-bottom:1.5rem; position:relative; z-index:2; }
.login-icon .icon-ring { display:inline-flex; align-items:center; justify-content:center; width:84px; height:84px; border-radius:50%; position:relative; }
.login-icon .icon-ring::before { content:''; position:absolute; inset:-3px; border-radius:50%; border:2px solid transparent; border-top-color:#00f0ff; border-right-color:#ff00e5; animation:ringRotate 4s linear infinite; }
@keyframes ringRotate{to{transform:rotate(360deg);}}
.login-icon .icon-ring::after { content:''; position:absolute; inset:-8px; border-radius:50%; border:1px solid transparent; border-bottom-color:rgba(57,255,20,0.3); border-left-color:rgba(0,240,255,0.2); animation:ringRotate 6s linear infinite reverse; }
.login-icon i { font-size:2.2rem; color:#00f0ff; position:relative; z-index:1; filter:drop-shadow(0 0 18px rgba(0,240,255,0.6)) drop-shadow(0 0 40px rgba(0,240,255,0.2)); background:radial-gradient(circle,rgba(0,240,255,0.08) 0%,transparent 70%); width:84px; height:84px; display:inline-flex; align-items:center; justify-content:center; border-radius:50%; }
.login-title { font-family:var(--font-display); font-size:2.4rem; font-weight:700; text-align:center; letter-spacing:0.1em; text-transform:uppercase; color:#fff; margin-bottom:0.25rem; position:relative; z-index:2; text-shadow:0 0 10px rgba(255,0,229,0.7),0 0 25px rgba(255,0,229,0.4),0 0 50px rgba(255,0,229,0.2),0 0 100px rgba(255,0,229,0.1); animation:titleFlicker 4s ease-in-out infinite; }
@keyframes titleFlicker{0%,100%{opacity:1;}48%{opacity:1;}50%{opacity:0.92;}52%{opacity:1;}80%{opacity:1;}82%{opacity:0.95;}84%{opacity:1;}}
.login-sub { text-align:center; font-size:0.7rem; font-weight:600; letter-spacing:0.3em; text-transform:uppercase; color:#ff00e5; margin-bottom:2.5rem; position:relative; z-index:2; text-shadow:0 0 12px rgba(255,0,229,0.5); }
.input-group { margin-bottom:1.5rem; position:relative; z-index:2; }
.input-label { display:block; font-family:var(--font-display); font-size:0.68rem; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:#00f0ff; margin-bottom:0.5rem; text-shadow:0 0 8px rgba(0,240,255,0.35); }
.input-group input { width:100%; padding:0.9rem 1rem 0.9rem 2.8rem; background:rgba(0,240,255,0.025); border:1px solid rgba(0,240,255,0.15); border-radius:14px; font-family:var(--font-body); font-size:0.88rem; color:var(--fg); transition:all 0.35s ease; box-shadow:inset 0 2px 10px rgba(0,0,0,0.35); }
.input-group input:focus { outline:none; border-color:rgba(0,240,255,0.6); background:rgba(0,240,255,0.05); box-shadow:0 0 0 4px rgba(0,240,255,0.08),0 0 25px -5px rgba(0,240,255,0.25),inset 0 2px 10px rgba(0,0,0,0.3); }
.input-group .input-icon { position:absolute; left:1rem; top:2.4rem; transform:translateY(-50%); color:rgba(0,240,255,0.4); font-size:0.9rem; transition:all 0.35s ease; pointer-events:none; }
.password-toggle { position:absolute; right:0.85rem; top:2.4rem; transform:translateY(-50%); background:none; border:none; color:rgba(110,113,129,0.5); cursor:pointer; font-size:0.88rem; padding:0; display:flex; align-items:center; justify-content:center; transition:all 0.25s ease; width:34px; height:34px; border-radius:10px; }
.password-toggle:hover { color:#00f0ff; background:rgba(0,240,255,0.08); text-shadow:0 0 8px rgba(0,240,255,0.5); }
.login-btn { width:100%; padding:1.05rem; position:relative; z-index:2; background:linear-gradient(135deg,rgba(0,240,255,0.08),rgba(57,255,20,0.03)); border:1px solid rgba(0,240,255,0.35); border-radius:16px; font-family:var(--font-display); font-weight:700; font-size:1rem; color:#00f0ff; cursor:pointer; transition:all 0.35s ease; margin-top:1rem; display:flex; align-items:center; justify-content:center; gap:0.7rem; letter-spacing:0.18em; text-transform:uppercase; text-shadow:0 0 12px rgba(0,240,255,0.5); box-shadow:0 0 25px -5px rgba(0,240,255,0.25),inset 0 1px 0 rgba(255,255,255,0.04); overflow:hidden; }
.login-btn::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg,transparent,rgba(0,240,255,0.15),transparent); transition:left 0.6s ease; }
.login-btn:hover { transform:translateY(-3px); border-color:rgba(0,240,255,0.7); box-shadow:0 0 40px -5px rgba(0,240,255,0.4),0 12px 35px -10px rgba(0,240,255,0.25),inset 0 1px 0 rgba(255,255,255,0.08); }
.login-btn:hover::before { left:100%; }
.login-btn:active { transform:translateY(1px); }
.login-btn.success-flash { border-color:rgba(57,255,20,0.7); color:#39ff14; text-shadow:0 0 12px rgba(57,255,20,0.6); box-shadow:0 0 40px -5px rgba(57,255,20,0.4),inset 0 0 30px rgba(57,255,20,0.08); }
.login-error { font-size:0.75rem; color:#ff0055; text-align:center; margin-top:1.2rem; min-height:1.5rem; font-weight:500; text-shadow:0 0 8px rgba(255,0,85,0.4); position:relative; z-index:2; animation:shakeError 0.4s ease; }
@keyframes shakeError{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}50%{transform:translateX(6px);}75%{transform:translateX(-3px);}}
.login-footer-note { margin-top:2rem; text-align:center; font-size:0.6rem; color:rgba(0,240,255,0.35); letter-spacing:0.25em; text-transform:uppercase; padding-top:1.2rem; border-top:1px solid rgba(0,240,255,0.08); position:relative; z-index:2; }

/* ========= DASHBOARD ENTRANCE & SIDEBAR ========= */
.app-layout { display:flex; min-height:100vh; position:relative; z-index:1; }
.app-layout.entering .sidebar { animation:slideInLeft 0.7s cubic-bezier(0.16,1,0.3,1) both; }
.app-layout.entering .main-content { animation:fadeInUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.15s both; }
@keyframes slideInLeft { from{opacity:0;transform:translateX(-40px);} to{opacity:1;transform:translateX(0);} }
@keyframes fadeInUp { from{opacity:0;transform:translateY(24px);} to{opacity:1;transform:translateY(0);} }

.bg-atmosphere{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-atmosphere .orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:0.4;animation:orbFloat 20s ease-in-out infinite alternate;}
.bg-atmosphere .orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(232,168,56,0.18),transparent 70%);top:-10%;left:-5%;}
.bg-atmosphere .orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(240,104,88,0.12),transparent 70%);bottom:-15%;right:-5%;}
.bg-atmosphere .orb-3{width:350px;height:350px;background:radial-gradient(circle,rgba(126,184,138,0.1),transparent 70%);top:40%;left:50%;}
.bg-atmosphere .orb-4{width:300px;height:300px;background:radial-gradient(circle,rgba(79,195,247,0.08),transparent 70%);top:10%;right:20%;}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1);}33%{transform:translate(30px,-40px) scale(1.05);}66%{transform:translate(-20px,20px) scale(0.95);}100%{transform:translate(15px,-15px) scale(1.02);}}

.sidebar { width:var(--sidebar-w); background:linear-gradient(180deg,rgba(17,17,24,0.96),rgba(8,8,12,0.98)); backdrop-filter:blur(20px); border-right:1px solid var(--border); display:flex; flex-direction:column; position:sticky; top:0; height:100vh; flex-shrink:0; overflow-y:auto; }
.sidebar-header{padding:1.75rem 1.5rem 1.5rem;}
.sidebar-brand{font-family:var(--font-display);font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:0.7rem;}
.sidebar-brand-icon{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--accent),rgba(232,168,56,0.6));display:flex;align-items:center;justify-content:center;color:#08080c;}
.sidebar-brand-sub{font-size:0.6rem;color:var(--fg-dim);margin-top:0.35rem;}
.sidebar-nav{flex:1;padding:0.5rem 1rem;display:flex;flex-direction:column;gap:0.35rem;}
.sidebar-section-label{font-family:var(--font-display);font-size:0.58rem;font-weight:600;color:var(--fg-dim);letter-spacing:0.16em;padding:1rem 0.85rem 0.55rem;}
.sidebar-item{display:flex;align-items:center;gap:0.8rem;padding:0.8rem 0.85rem;border-radius:14px;cursor:pointer;transition:all 0.3s;border:1px solid transparent;}
.sidebar-item .icon-wrap{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);color:var(--fg-dim);}
.sidebar-item .label{font-family:var(--font-display);font-size:0.82rem;font-weight:500;color:var(--fg-muted);}
.sidebar-item:hover{background:rgba(255,255,255,0.02);}
.sidebar-item.active{background:linear-gradient(135deg,var(--accent-soft),rgba(232,168,56,0.02));border-color:rgba(232,168,56,0.15);}
.sidebar-item.active .label{color:var(--fg);font-weight:600;}
.sidebar-item.active .icon-wrap{background:linear-gradient(135deg,rgba(232,168,56,0.2),rgba(232,168,56,0.08));color:var(--accent);}
.sidebar-footer{padding:1.25rem;border-top:1px solid var(--border);}
.timer-bar-track{width:100%;height:3px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;}
.timer-bar-fill{height:100%;background:linear-gradient(90deg,var(--sage),rgba(126,184,138,0.6));transition:width 1s linear;}

.main-content{flex:1;padding:2.5rem 3rem;}
.dashboard-container{max-width:1280px;margin:0 auto;}
.page-header{margin-bottom:2rem;display:flex;justify-content:space-between;flex-wrap:wrap;}
.page-title{font-family:var(--font-display);font-size:2rem;font-weight:700;}
.accent-word{color:var(--accent);}
.qris-word{color:var(--qris-primary);}
.status-badge{display:inline-flex;align-items:center;gap:0.4rem;padding:0.35rem 0.8rem;border-radius:20px;background:rgba(126,184,138,0.06);border:1px solid rgba(126,184,138,0.15);font-size:0.68rem;color:var(--sage);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--sage);animation:dotPulse 2s infinite;}
@keyframes dotPulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.refresh-btn,.logout-header-btn{width:36px;height:36px;border-radius:11px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--fg-dim);cursor:pointer;}
.search-bar{position:relative;margin-bottom:0.75rem;}
.search-input{width:100%;padding:0.8rem 3rem 0.8rem 2.85rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);color:var(--fg);}
.search-input:focus{border-color:rgba(232,168,56,0.35);outline:none;}
.search-clear{position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:8px;display:none;cursor:pointer;}
.search-clear.visible{display:flex;}
.qris-type-filter{display:flex;gap:0.5rem;background:rgba(0,0,0,0.2);padding:0.2rem;border-radius:40px;border:1px solid var(--border);}
.filter-chip{background:transparent;border:none;padding:0.4rem 1rem;border-radius:32px;font-size:0.7rem;font-weight:500;color:var(--fg-muted);cursor:pointer;}
.filter-chip.active{background:var(--qris-primary);color:#08080c;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.25rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;transition:all 0.3s;}
.card:hover{border-color:var(--border-hover);transform:translateY(-4px);}
.card-inner{padding:1.25rem 1.4rem 1.4rem;}
.card-title{font-family:var(--font-display);font-size:1.05rem;font-weight:600;}
.card-content{font-size:0.84rem;color:var(--content-color);margin-top:0.5rem;}
.qris-image-preview{margin-top:0.75rem;border-radius:14px;overflow:hidden;text-align:center;background:rgba(0,0,0,0.2);}
.qris-image-preview img{max-width:100%;max-height:180px;object-fit:contain;transition:transform 0.3s;}
.card:hover .qris-image-preview img{transform:scale(1.02);}
.btn-action{display:inline-flex;align-items:center;gap:0.4rem;padding:0.38rem 0.8rem;border-radius:22px;font-size:0.7rem;font-weight:500;cursor:pointer;border:1px solid;background:var(--accent-soft);border-color:rgba(232,168,56,0.18);color:var(--accent);}
.modal-overlay{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all 0.35s;}
.modal-overlay.open{opacity:1;visibility:visible;}
.modal-panel{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);max-width:680px;width:100%;max-height:85vh;overflow:auto;}
.modal-header{display:flex;justify-content:flex-end;padding:1rem 1.5rem;}
.modal-body{padding:0 1.75rem 1.75rem;}
.modal-qris-image{text-align:center;margin-top:1rem;}
.modal-qris-image img{max-width:100%;max-height:280px;border-radius:12px;}
.loading-state,.empty-state{display:flex;flex-direction:column;align-items:center;padding:4rem 2rem;gap:1rem;}
@media(max-width:900px){.sidebar{width:100%;height:auto;position:relative;}.main-content{padding:1.5rem;}}
</style>
</head>
<body>
<div class="bg-atmosphere"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div><div class="orb orb-4"></div></div>

<div id="loginModal" class="login-overlay">
    <div class="scanlines"></div><div class="grid-bg"></div>
    <div class="corner corner-tl"></div><div class="corner corner-tr"></div><div class="corner corner-bl"></div><div class="corner corner-br"></div>
    <div class="login-card">
        <div class="login-icon"><div class="icon-ring"><i class="fa-solid fa-lock"></i></div></div>
        <div class="login-title">RUANG WAKTU</div><div class="login-sub">Secure Access</div>
        <div class="input-group"><label class="input-label">Username</label><i class="fa-regular fa-user input-icon"></i><input type="text" id="loginUsername"></div>
        <div class="input-group"><label class="input-label">Password</label><i class="fa-regular fa-key input-icon"></i><input type="password" id="loginPassword"><button type="button" id="togglePasswordBtn" class="password-toggle"><i class="fa-regular fa-eye"></i></button></div>
        <button class="login-btn" id="loginBtn"><i class="fa-solid fa-arrow-right-to-bracket"></i> MASUK</button>
        <div id="loginError" class="login-error"></div><div class="login-footer-note">Ruang Waktu · Data Center</div>
    </div>
</div>

<div class="app-layout" id="appLayout">
<aside class="sidebar">
<div class="sidebar-header"><div class="sidebar-brand"><div class="sidebar-brand-icon"><i class="fa-solid fa-clock-rotate-left"></i></div><div><div>Ruang Waktu</div><div class="sidebar-brand-sub">Data Center</div></div></div></div>
<nav class="sidebar-nav">
    <div class="sidebar-section-label">Data Sheet</div>
    <div class="sidebar-item" data-filter="gid0"><div class="icon-wrap"><i class="fa-solid fa-layer-group"></i></div><div class="label">ALL PK</div></div>
    <div class="sidebar-item" data-filter="gid5"><div class="icon-wrap"><i class="fa-solid fa-database"></i></div><div class="label">JADWAL PASARAN</div></div>
    <div class="sidebar-item" data-filter="gid473"><div class="icon-wrap"><i class="fa-solid fa-trophy"></i></div><div class="label">HADIAH TOGEL</div></div>
    <div class="sidebar-item" data-filter="gidQris"><div class="icon-wrap"><i class="fa-solid fa-qrcode"></i></div><div class="label">QRIS PAYMENT</div></div>
    <div class="sidebar-item" data-filter="gidProfile"><div class="icon-wrap"><i class="fa-solid fa-building-columns"></i></div><div class="label">PROFILE BANK & E-WALLET</div></div>
</nav>
<div class="sidebar-footer"><div class="timer-bar-track"><div class="timer-bar-fill" id="timerBarFill"></div></div><div id="timerLastUpdate" style="font-size:0.6rem;margin-top:0.5rem;color:var(--fg-dim);"><i class="fa-regular fa-clock"></i> Menunggu</div></div>
</aside>
<main class="main-content"><div class="dashboard-container">
<header class="page-header"><div><h1 class="page-title" id="pageTitle"><span class="qris-word">QRIS Payment</span></h1></div><div><div class="status-badge"><span class="live-dot" id="liveDot"></span><span>Live</span></div><button class="refresh-btn" id="refreshBtn"><i class="fa-solid fa-rotate-right"></i></button><button id="logoutHeaderBtn" class="logout-header-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i></button></div></header>
<div class="sticky-top"><div class="search-bar"><i class="fa-solid fa-magnifying-glass" style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--fg-dim);"></i><input type="text" class="search-input" id="searchInput" placeholder="Cari..."><button class="search-clear" id="searchClear"><i class="fa-solid fa-xmark"></i></button><div class="search-result-count" id="searchResultCount" style="font-size:0.7rem;margin-top:0.3rem;"></div></div><div class="toolbar"><div class="qris-type-filter" id="qrisTypeFilterWrapper"><button class="filter-chip active" data-type="all"> Semua</button><button class="filter-chip" data-type="bank"> Bank</button><button class="filter-chip" data-type="ewallet"> E-Wallet</button></div><div class="view-toggle"><button class="view-toggle-btn active" data-view="grid"><i class="fa-solid fa-grip"></i> Grid</button><button class="view-toggle-btn" data-view="list"><i class="fa-solid fa-list"></i> List</button></div></div></div>
<section id="contentArea"><div class="loading-state"><div class="loader-ring" style="width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;"></div><span>Memuat data...</span></div></section>
<footer class="page-footer" style="margin-top:2rem;text-align:center;font-size:0.7rem;color:var(--fg-dim);">Ruang Waktu — Data Center</footer>
</div></main>
</div>
<div class="modal-overlay" id="modalOverlay"><div class="modal-panel"><div class="modal-accent" id="modalAccent" style="height:4px;"></div><div class="modal-header"><button class="modal-close" id="modalCloseBtn"><i class="fa-solid fa-xmark"></i></button></div><div class="modal-body"><div class="modal-section"><div class="modal-section-label">Judul</div><div class="modal-section-content" id="modalColA"></div></div><div class="modal-section"><div class="modal-section-label">Detail</div><div class="modal-section-content" id="modalColB"></div></div><div class="modal-actions" id="modalActions"></div></div></div></div>

<script>
const LOGIN_KEY = "ruangWaktuAuth";
const VALID_USERNAME = "Putra28";
const VALID_PASSWORD = "Tyaaa27";
function isLoggedIn() { return localStorage.getItem(LOGIN_KEY) === "true"; }
function setLoggedIn(state) { if (state) localStorage.setItem(LOGIN_KEY, "true"); else localStorage.removeItem(LOGIN_KEY); }
function showLoginModal() { document.getElementById("loginModal").classList.remove("hidden"); }
function hideLoginModal() { document.getElementById("loginModal").classList.add("hidden"); }
function logout() { setLoggedIn(false); showLoginModal(); document.getElementById("appLayout").classList.remove("entering"); }
function attemptLogin(username, password) { if (username === VALID_USERNAME && password === VALID_PASSWORD) { setLoggedIn(true); hideLoginModal(); document.getElementById("appLayout").classList.add("entering"); loadData(); initSidebar(); initViewToggle(); initQrisTypeFilter(); return true; } else { document.getElementById("loginError").innerText = "Username atau password salah."; return false; } }
document.getElementById("loginBtn")?.addEventListener("click", () => attemptLogin(document.getElementById("loginUsername").value.trim(), document.getElementById("loginPassword").value));
document.getElementById("logoutHeaderBtn")?.addEventListener("click", logout);
document.getElementById("togglePasswordBtn")?.addEventListener("click", () => { let p = document.getElementById("loginPassword"); p.type = p.type === "password" ? "text" : "password"; });

// Konfigurasi Spreadsheet
const SPREADSHEET_ID = "1VO91WJb1w2Pi4V_GO12hDl8KPkkmHkOUFxtqEmCvygM";
const GID_TAMBAHAN = "575827072";
const GID_HADIAH   = "473202279";
const GID_QRIS     = "58319050";
const GID_PROFILE  = "1187407703";
const DATA_URL_GID0   = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;
const DATA_URL_GID5   = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&gid=${GID_TAMBAHAN}`;
const DATA_URL_GID473 = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&gid=${GID_HADIAH}`;
const DATA_URL_QRIS   = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&gid=${GID_QRIS}`;
const DATA_URL_PROFILE = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&gid=${GID_PROFILE}`;

let gid0Data = [], gid5Data = [], gid473Data = [], gidQrisData = [], gidProfileData = [];
let currentFilter = "gidQris", currentView = "grid", searchQuery = "", isLoading = false, lastError = null, qrisTypeFilter = "all";
let lastRefreshTime = null, timerRemaining = 30, timerInterval = null;
const contentArea = document.getElementById("contentArea"), searchInput = document.getElementById("searchInput"), searchClear = document.getElementById("searchClear");
const pageTitleEl = document.getElementById("pageTitle"), refreshBtn = document.getElementById("refreshBtn"), liveDot = document.getElementById("liveDot");
const timerBarFillEl = document.getElementById("timerBarFill"), timerLastUpdateEl = document.getElementById("timerLastUpdate");

function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[m]); }
function parseGvizResponse(text) { const s = text.indexOf("{"), e = text.lastIndexOf("}"); if (s === -1 || e === -1) throw new Error("Invalid"); return JSON.parse(text.substring(s, e + 1)).table; }
function formatTime(date) { return date.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' }); }

// Fetch data dengan deteksi gambar otomatis (untuk QRIS dan Profile)
async function fetchRichData(url) {
    const res = await fetch(url); if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const table = parseGvizResponse(await res.text());
    const rows = table.rows || [];
    const items = [];
    for (let row of rows) {
        const cells = row.c || [];
        const rawValues = cells.map(c => c?.v != null ? String(c.v).trim() : "");
        if (rawValues.every(v => !v)) continue;
        let imageUrl = "";
        for (let val of rawValues) {
            if (val && (val.match(/\.(jpg|jpeg|png|webp|gif)(\?.*)?$/i) || val.includes("drive.google.com/uc?id=") || val.startsWith("data:image"))) {
                imageUrl = val; break;
            }
        }
        items.push({ title: rawValues[0] || "Informasi", content: rawValues[1] || "", imageUrl, raw: rawValues });
    }
    return items;
}
async function fetchSimpleData(url) { const res = await fetch(url); const table = parseGvizResponse(await res.text()); return (table.rows || []).map(r => ({ title: r.c[0]?.v != null ? String(r.c[0].v) : "", content: r.c[1]?.v != null ? String(r.c[1].v) : "" })); }

async function fetchSheetData() {
    const [r0, r5, r473, rQris, rProfile] = await Promise.allSettled([
        fetchSimpleData(DATA_URL_GID0), fetchSimpleData(DATA_URL_GID5), fetchSimpleData(DATA_URL_GID473),
        fetchRichData(DATA_URL_QRIS), fetchRichData(DATA_URL_PROFILE)
    ]);
    if (r0.status === "fulfilled") gid0Data = r0.value;
    if (r5.status === "fulfilled") gid5Data = r5.value;
    if (r473.status === "fulfilled") gid473Data = r473.value;
    if (rQris.status === "fulfilled") gidQrisData = rQris.value;
    if (rProfile.status === "fulfilled") gidProfileData = rProfile.value;
}

function detectQrisType(item) { const text = (item.title + " " + item.content).toLowerCase(); if (['bca','mandiri','bri','bni','cimb','permata','bsi','bank','danamon','ocbc','maybank'].some(k=>text.includes(k))) return "bank"; if (['ovo','gopay','dana','linkaja','shopeepay','spay','ewallet','dompet digital','paylater'].some(k=>text.includes(k))) return "ewallet"; return "all"; }
function getActiveData() {
    if (currentFilter === "gid0") return gid0Data;
    if (currentFilter === "gid5") return gid5Data;
    if (currentFilter === "gid473") return gid473Data;
    if (currentFilter === "gidProfile") return gidProfileData;
    let data = [...gidQrisData];
    if (qrisTypeFilter !== "all") data = data.filter(item => detectQrisType(item) === qrisTypeFilter);
    return data;
}
function getFilteredData() { let data = getActiveData(); if (searchQuery.trim()) { const q = searchQuery.trim().toLowerCase(); data = data.filter(item => (item.title?.toLowerCase().includes(q) || item.content?.toLowerCase().includes(q))); } return data; }
function getConfigKey() { if (currentFilter === "gidProfile") return "gidProfile"; if (currentFilter === "gidQris") return "qrisCombined"; return currentFilter; }
function getConfig() {
    const map = {
        gid0: { titleHTML: '<span class="accent-word">ALL</span> PK', stripGradient: 'linear-gradient(90deg, #e8a838, rgba(232,168,56,0.2))', emptyIcon:'fa-layer-group', emptyTitle:'Tidak ada data PK', searchPlaceholder:'Cari data PK...' },
        gid5: { titleHTML: 'Jadwal <span class="accent-word">PASARAN</span>', stripGradient: 'linear-gradient(90deg, #f06858, rgba(240,104,88,0.2))', emptyIcon:'fa-calendar-days', emptyTitle:'Tidak ada jadwal', searchPlaceholder:'Cari jadwal...' },
        gid473: { titleHTML: 'Hadiah <span class="accent-word">TOGEL</span>', stripGradient: 'linear-gradient(90deg, #a78bfa, rgba(167,139,250,0.2))', emptyIcon:'fa-trophy', emptyTitle:'Tidak ada hadiah', searchPlaceholder:'Cari hadiah...' },
        qrisCombined: { titleHTML: '<span class="qris-word">QRIS Payment</span>', stripGradient: 'linear-gradient(90deg, #4fc3f7, rgba(79,195,247,0.2))', emptyIcon:'fa-qrcode', emptyTitle:'Tidak ada QRIS', searchPlaceholder:'Cari QRIS (bank/ewallet)...' },
        gidProfile: { titleHTML: '<span class="accent-word">PROFILE BANK & E-WALLET</span>', stripGradient: 'linear-gradient(90deg, #36d1dc, rgba(54,209,220,0.2))', emptyIcon:'fa-building-columns', emptyTitle:'Belum ada data profile', searchPlaceholder:'Cari profile bank / e-wallet...' }
    };
    return map[getConfigKey()] || map.qrisCombined;
}
function updatePageHeader() { const cfg = getConfig(); pageTitleEl.innerHTML = cfg.titleHTML; searchInput.placeholder = cfg.searchPlaceholder; document.getElementById("qrisTypeFilterWrapper").style.display = currentFilter === "gidQris" ? "flex" : "none"; }
function showToast(msg) { const t = document.createElement("div"); t.className = "toast"; t.innerHTML = `<i class="fa-solid fa-check-circle"></i> ${escapeHtml(msg)}`; document.body.appendChild(t); setTimeout(()=>t.remove(),1800); }
async function copyTextToClipboard(text,label){ if(!text) return; try{ await navigator.clipboard.writeText(text); showToast(`${label||"Teks"} disalin`); } catch(e){} }
async function copyImageToClipboard(url,title){ if(!url) return; try{ const r=await fetch(url); const blob=await r.blob(); await navigator.clipboard.write([new ClipboardItem({[blob.type]:blob})]); showToast(`Gambar ${title} disalin`); } catch(e){} }

function renderContent() {
    if (lastError && !isLoading) { contentArea.innerHTML = `<div class="error-state"><i class="fa-solid fa-triangle-exclamation"></i><span>${escapeHtml(lastError)}</span></div>`; return; }
    if (isLoading) { contentArea.innerHTML = `<div class="loading-state"><div class="loader-ring" style="width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;"></div><span>Memuat...</span></div>`; return; }
    const items = getFilteredData(); const cfg = getConfig(); const q = searchQuery.trim();
    document.getElementById("searchResultCount").innerHTML = q ? `Ditemukan ${items.length} dari ${getActiveData().length} data` : "";
    if (items.length === 0) { contentArea.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fa-solid ${cfg.emptyIcon}"></i></div><div class="empty-title">${cfg.emptyTitle}</div></div>`; return; }
    if (currentView === "grid") {
        let html = '<div class="cards-grid">';
        items.forEach((it,idx)=>{
            const title = q ? it.title.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark style="background:rgba(79,195,247,0.2);color:var(--qris-primary);">$1</mark>') : escapeHtml(it.title);
            const content = q ? it.content.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark style="background:rgba(79,195,247,0.2);color:var(--qris-primary);">$1</mark>') : escapeHtml(it.content);
            const imgHtml = it.imageUrl ? `<div class="qris-image-preview"><img src="${escapeHtml(it.imageUrl)}" loading="lazy" alt="gambar" onerror="this.style.opacity='0.3'"></div>` : '';
            html += `<article class="card" data-index="${idx}"><div class="accent-strip" style="background:${cfg.stripGradient};height:3px;"></div><div class="card-inner"><h2 class="card-title">${title}</h2>${content?`<div class="card-content">${content}</div>`:''}${imgHtml}<div class="qris-actions" style="margin-top:0.8rem;display:flex;gap:0.5rem;"><button class="btn-action copy-text-btn" data-index="${idx}"><i class="fa-regular fa-copy"></i> Copy Teks</button>${it.imageUrl?`<button class="btn-action copy-img-btn" data-index="${idx}"><i class="fa-regular fa-image"></i> Copy Gambar</button>`:''}</div></div></article>`;
        });
        html += '</div>'; contentArea.innerHTML = html;
    } else {
        let html = '<div class="cards-list">';
        items.forEach((it,idx)=>{
            const title = q ? it.title.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark style="background:rgba(79,195,247,0.2);color:var(--qris-primary);">$1</mark>') : escapeHtml(it.title);
            const content = q ? it.content.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark style="background:rgba(79,195,247,0.2);color:var(--qris-primary);">$1</mark>') : escapeHtml(it.content);
            html += `<div class="list-row" data-index="${idx}" style="display:grid;grid-template-columns:1fr 2fr auto;gap:1rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:0.6rem;"><div class="row-title">${title}</div><div class="row-content">${content}</div><div class="row-actions"><button class="row-action-btn copy-text-btn" data-index="${idx}" style="background:transparent;border:1px solid var(--border);padding:0.4rem 0.7rem;border-radius:8px;"><i class="fa-regular fa-copy"></i></button>${it.imageUrl?`<button class="row-action-btn copy-img-btn" data-index="${idx}" style="background:transparent;border:1px solid var(--border);padding:0.4rem 0.7rem;border-radius:8px;"><i class="fa-regular fa-image"></i></button>`:''}<button class="row-action-btn detail-btn" data-index="${idx}" style="background:transparent;border:1px solid var(--border);padding:0.4rem 0.7rem;border-radius:8px;"><i class="fa-solid fa-expand"></i></button></div></div>`;
        });
        html += '</div>'; contentArea.innerHTML = html;
    }
}

function openModal(index) { const items = getFilteredData(); if(!items[index]) return; const it = items[index]; const cfg=getConfig(); document.getElementById("modalAccent").style.background=cfg.stripGradient; document.getElementById("modalColA").innerHTML=`<strong>${escapeHtml(it.title)}</strong>`; let body = escapeHtml(it.content||""); if(it.imageUrl) body += `<div class="modal-qris-image"><img src="${escapeHtml(it.imageUrl)}" alt="gambar"></div>`; document.getElementById("modalColB").innerHTML=body; const actions = document.getElementById("modalActions"); actions.innerHTML = `<button class="btn-action" id="modalCopyTextBtn"><i class="fa-regular fa-copy"></i> Copy Teks</button>${it.imageUrl?'<button class="btn-action" id="modalCopyImageBtn"><i class="fa-regular fa-image"></i> Copy Gambar</button>':''}`; document.getElementById("modalCopyTextBtn")?.addEventListener("click",()=>copyTextToClipboard(it.content,"Teks")); document.getElementById("modalCopyImageBtn")?.addEventListener("click",()=>copyImageToClipboard(it.imageUrl,it.title)); document.getElementById("modalOverlay").classList.add("open"); }
function closeModal(){ document.getElementById("modalOverlay").classList.remove("open"); }
document.getElementById("modalCloseBtn")?.addEventListener("click",closeModal); document.getElementById("modalOverlay")?.addEventListener("click",e=>{if(e.target===document.getElementById("modalOverlay")) closeModal();});
contentArea.addEventListener("click", async (e) => {
    const textBtn = e.target.closest(".copy-text-btn"); if(textBtn){ const idx=parseInt(textBtn.dataset.index); const it=getFilteredData()[idx]; if(it) await copyTextToClipboard(it.content,"Teks"); return; }
    const imgBtn = e.target.closest(".copy-img-btn"); if(imgBtn){ const idx=parseInt(imgBtn.dataset.index); const it=getFilteredData()[idx]; if(it?.imageUrl) await copyImageToClipboard(it.imageUrl,it.title); return; }
    const detailBtn = e.target.closest(".detail-btn"); if(detailBtn){ openModal(parseInt(detailBtn.dataset.index)); return; }
    const card = e.target.closest(".card"); if(card){ openModal(parseInt(card.dataset.index)); return; }
    const row = e.target.closest(".list-row"); if(row){ openModal(parseInt(row.dataset.index)); }
});

function initSidebar() { document.querySelectorAll(".sidebar-item").forEach(item=>{ item.addEventListener("click",()=>{ document.querySelectorAll(".sidebar-item").forEach(i=>i.classList.remove("active")); item.classList.add("active"); currentFilter = item.dataset.filter; searchQuery=""; searchInput.value=""; searchClear.classList.remove("visible"); qrisTypeFilter="all"; document.querySelectorAll(".filter-chip").forEach(chip=>{ chip.classList.toggle("active", chip.dataset.type==="all"); }); updatePageHeader(); renderContent(); }); }); }
function initViewToggle() { document.querySelectorAll(".view-toggle-btn").forEach(btn=>{ btn.addEventListener("click",()=>{ document.querySelectorAll(".view-toggle-btn").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); currentView=btn.dataset.view; renderContent(); }); }); }
function initQrisTypeFilter() { document.querySelectorAll(".filter-chip").forEach(chip=>{ chip.addEventListener("click",()=>{ if(currentFilter!=="gidQris") return; document.querySelectorAll(".filter-chip").forEach(c=>c.classList.remove("active")); chip.classList.add("active"); qrisTypeFilter=chip.dataset.type; renderContent(); }); }); }

function updateProgressBar() { timerBarFillEl.style.width = (timerRemaining / 30 * 100) + '%'; }
function updateLastRefresh() { if(lastRefreshTime) timerLastUpdateEl.innerHTML = `<i class="fa-solid fa-check-circle" style="color:var(--sage);"></i> ${formatTime(lastRefreshTime)}`; else timerLastUpdateEl.innerHTML = `<i class="fa-regular fa-clock"></i> Menunggu`; }
function startTimer() { if(timerInterval) clearInterval(timerInterval); timerRemaining=30; updateProgressBar(); timerInterval=setInterval(()=>{ timerRemaining--; if(timerRemaining<=0){ silentRefresh(); timerRemaining=30; } updateProgressBar(); },1000); }
async function silentRefresh() { if(isLoading) return; isLoading=true; try{ await fetchSheetData(); lastError=null; lastRefreshTime=new Date(); updateLastRefresh(); renderContent(); } catch(err){ lastError=err.message; } finally{ isLoading=false; } }
async function manualRefresh() { if(isLoading) return; isLoading=true; liveDot.classList.add("refreshing"); refreshBtn.classList.add("spinning"); renderContent(); try{ await fetchSheetData(); lastError=null; lastRefreshTime=new Date(); updateLastRefresh(); showToast("Data diperbarui"); renderContent(); } catch(err){ lastError=err.message; showToast("Gagal refresh"); renderContent(); } finally{ isLoading=false; liveDot.classList.remove("refreshing"); refreshBtn.classList.remove("spinning"); } }
refreshBtn.addEventListener("click",manualRefresh);
searchInput.addEventListener("input",()=>{ searchQuery=searchInput.value; searchClear.classList.toggle("visible",searchQuery.length>0); renderContent(); });
searchClear.addEventListener("click",()=>{ searchInput.value=""; searchQuery=""; searchClear.classList.remove("visible"); renderContent(); });
async function loadData() { isLoading=true; updatePageHeader(); renderContent(); try{ await fetchSheetData(); lastError=null; lastRefreshTime=new Date(); updateLastRefresh(); } catch(err){ lastError=err.message; } finally{ isLoading=false; renderContent(); startTimer(); } }

if (!isLoggedIn()) { showLoginModal(); } else { hideLoginModal(); document.getElementById("appLayout").classList.add("entering"); loadData(); initSidebar(); initViewToggle(); initQrisTypeFilter(); }
</script>
</body>
</html>
